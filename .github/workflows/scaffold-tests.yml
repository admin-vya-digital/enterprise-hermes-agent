# GitHub Actions — Scaffold Tests CI/CD
#
# Executa testes automatizados para scaffold new/upgrade.
#
# Triggers:
# - Push em master, main, develop
# - Pull requests
# - Workflow dispatch manual
# - Schedule semanal (domingos 02:00 UTC)
#
# Jobs:
# 1. test-scaffold-new: Testa criação de novos projetos
# 2. test-scaffold-upgrade: Testa upgrade de projetos existentes (51 validações)
#
# Relacionado:
# - tests/test_scaffold_new.py
# - tests/test_scaffold_upgrade.py
# - scripts/validate-workspace-upgrade.py

name: Scaffold Tests

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - "scripts/scaffold.py"
      - "scripts/lib/**"
      - "scripts/validate-workspace-upgrade.py"
      - "tests/test_scaffold_*.py"
      - ".github/workflows/scaffold-tests.yml"
  pull_request:
    branches:
      - master
      - main
      - develop
    paths:
      - "scripts/scaffold.py"
      - "scripts/lib/**"
      - "scripts/validate-workspace-upgrade.py"
      - "tests/test_scaffold_*.py"
  workflow_dispatch:
  schedule:
    # Domingos às 02:00 UTC
    - cron: "0 2 * * 0"

jobs:
  test-scaffold-new:
    name: Test Scaffold New
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        test-case:
          - domain: programming
            language: python
          - domain: programming
            language: typescript
          - domain: infrastructure
            language: terraform
          - domain: analysis
            language: python

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pyyaml

      - name: Run test_scaffold_new.py
        run: |
          pytest tests/test_scaffold_new.py \
            -v \
            --tb=short \
            --timeout=120 \
            -k "test_scaffold_new_combinations[${{ matrix.test-case.domain }}-${{ matrix.test-case.language }}]"

      - name: Run all test_scaffold_new tests
        if: matrix.python-version == '3.11' && matrix.test-case.domain == 'programming' && matrix.test-case.language == 'python'
        run: |
          pytest tests/test_scaffold_new.py \
            -v \
            --tb=short \
            --timeout=300

  test-scaffold-upgrade:
    name: Test Scaffold Upgrade (51 validations)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pyyaml

      - name: Run test_scaffold_upgrade.py (CRITICAL)
        run: |
          pytest tests/test_scaffold_upgrade.py::test_scaffold_upgrade_all_validations \
            -v \
            --tb=long \
            --timeout=180

      - name: Run all upgrade tests
        run: |
          pytest tests/test_scaffold_upgrade.py \
            -v \
            --tb=short \
            --timeout=600

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: scaffold-upgrade-artifacts-py${{ matrix.python-version }}
          path: |
            /tmp/pytest-of-*/
            logs/
          retention-days: 7

  test-scaffold-smoke:
    name: Smoke Test — Full Workflow
    runs-on: ubuntu-latest
    needs: [test-scaffold-new, test-scaffold-upgrade]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout pyyaml

      - name: Create project via scaffold new
        run: |
          python scripts/scaffold.py new \
            --ci \
            --name smoke-test-project \
            --domain programming \
            --language python \
            --target-dir /tmp/smoke-test-project

      - name: Upgrade project via scaffold upgrade
        run: |
          cd /tmp/smoke-test-project
          python ${{ github.workspace }}/scripts/scaffold.py upgrade --force

      - name: Validate upgrade with 51 checks
        run: |
          python scripts/validate-workspace-upgrade.py /tmp/smoke-test-project

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-artifacts
          path: |
            /tmp/smoke-test-project/logs/
            /tmp/smoke-test-project/.scaffold-state.yaml
          retention-days: 3

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-scaffold-new, test-scaffold-upgrade, test-scaffold-smoke]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## 📊 Scaffold Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Scaffold New**: ${{ needs.test-scaffold-new.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Scaffold Upgrade (51 validations)**: ${{ needs.test-scaffold-upgrade.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke Test**: ${{ needs.test-scaffold-smoke.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.test-scaffold-new.result }}" == "success" ]] && \
             [[ "${{ needs.test-scaffold-upgrade.result }}" == "success" ]] && \
             [[ "${{ needs.test-scaffold-smoke.result }}" == "success" ]]; then
            echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ **Some tests failed. Review logs above.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
