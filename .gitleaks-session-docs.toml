# Gitleaks Configuration for Session Documentation Security
#
# Purpose: Detect accidental exposure of sensitive data in session documentation
# Scope: docs/SESSIONS/**/*.md
# Usage: gitleaks detect --config .gitleaks-session-docs.toml --source docs/SESSIONS/
#
# Part of: IMP-49 — Sistema de documentação incremental — Integração
# Created: 2026-04-03

title = "Gitleaks — Session Documentation Security Scan"

# Scan only session documentation
[extend]
useDefault = false

[allowlist]
description = "Allowed patterns in session docs (sanitized examples)"
regexes = [
    # Sanitized examples (ALLOWED)
    '''user@example\.(com|org|net)''',
    '''192\.0\.2\.\d+''',                     # TEST-NET-1 (RFC 5737)
    '''198\.51\.100\.\d+''',                   # TEST-NET-2 (RFC 5737)
    '''203\.0\.113\.\d+''',                    # TEST-NET-3 (RFC 5737)
    '''api\.exemplo\.(local|com)''',
    '''<(TOKEN|API_KEY|SECRET|REDACTED)>''',
    '''\*\*\*+''',                             # Redacted with asterisks
    '''(example|sample|test|mock|dummy)_?(key|token|password|secret)''',
    '''YOUR_.*_(KEY|TOKEN|PASSWORD)''',
    '''REPLACE_WITH_YOUR''',
]

# ================================
# CRITICAL RULES (P0)
# ================================

[[rules]]
id = "session-aws-access-key"
description = "AWS Access Key ID in session docs"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
tags = ["session-docs", "credentials", "aws"]

[[rules]]
id = "session-aws-secret-key"
description = "AWS Secret Access Key in session docs"
regex = '''(?i)aws_secret_access_key\s*[:=]\s*['\"]?[A-Za-z0-9/+=]{40}['\"]?'''
tags = ["session-docs", "credentials", "aws"]

[[rules]]
id = "session-github-token"
description = "GitHub Personal Access Token in session docs"
regex = '''ghp_[0-9a-zA-Z]{36}'''
tags = ["session-docs", "credentials", "github"]

[[rules]]
id = "session-github-oauth"
description = "GitHub OAuth Token in session docs"
regex = '''gho_[0-9a-zA-Z]{36}'''
tags = ["session-docs", "credentials", "github"]

[[rules]]
id = "session-gitlab-token"
description = "GitLab Personal Access Token in session docs"
regex = '''glpat-[0-9a-zA-Z\-_]{20,}'''
tags = ["session-docs", "credentials", "gitlab"]

[[rules]]
id = "session-jwt-token"
description = "JWT Token in session docs"
regex = '''eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'''
tags = ["session-docs", "credentials", "jwt"]

[[rules]]
id = "session-api-key-generic"
description = "Generic API Key pattern in session docs"
regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret)\s*[:=]\s*['\"]?(?!<)[0-9a-zA-Z\-_]{32,}['\"]?'''
tags = ["session-docs", "credentials", "api"]

[[rules]]
id = "session-bearer-token"
description = "Bearer Token in session docs"
regex = '''Bearer\s+(?!<)[A-Za-z0-9\-_\.]{20,}'''
tags = ["session-docs", "credentials", "bearer"]

[[rules]]
id = "session-ssh-private-key"
description = "SSH Private Key in session docs"
regex = '''-----BEGIN (RSA|OPENSSH|DSA|EC|PGP) PRIVATE KEY-----'''
tags = ["session-docs", "credentials", "ssh"]

[[rules]]
id = "session-password-assignment"
description = "Password assignment in session docs"
regex = '''(?i)(password|passwd|pwd)\s*[:=]\s*['\"]?(?!<|\*+)[^\s'\"\n]{8,}['\"]?'''
tags = ["session-docs", "credentials", "password"]

[[rules]]
id = "session-database-url"
description = "Database connection string with credentials in session docs"
regex = '''(?i)(postgres|mysql|mongodb|redis)://[^:]+:[^@]+@[^\s'"]+'''
tags = ["session-docs", "credentials", "database"]

# ================================
# HIGH PRIORITY RULES (P1)
# ================================

[[rules]]
id = "session-private-ip-10"
description = "Private IP address (10.x.x.x) in session docs"
regex = '''(?<!\.)10\.(\d{1,3}\.){2}\d{1,3}(?!\.)'''
tags = ["session-docs", "infrastructure", "ip"]

[[rules]]
id = "session-private-ip-172"
description = "Private IP address (172.16-31.x.x) in session docs"
regex = '''(?<!\.)172\.(1[6-9]|2[0-9]|3[01])\.(\d{1,3}\.)\d{1,3}(?!\.)'''
tags = ["session-docs", "infrastructure", "ip"]

[[rules]]
id = "session-private-ip-192"
description = "Private IP address (192.168.x.x) in session docs"
regex = '''(?<!\.)192\.168\.(\d{1,3}\.)\d{1,3}(?!\.)'''
tags = ["session-docs", "infrastructure", "ip"]

[[rules]]
id = "session-internal-hostname"
description = "Internal hostname patterns in session docs"
regex = '''(?i)(internal|corp|intranet|vpn|private)[-.][\w.-]+\.(local|internal|corp|priv)'''
tags = ["session-docs", "infrastructure", "hostname"]

[[rules]]
id = "session-slack-webhook"
description = "Slack Webhook URL in session docs"
regex = '''https://hooks\.slack\.com/services/T[A-Z0-9]{8}/B[A-Z0-9]{8}/[A-Za-z0-9]{24}'''
tags = ["session-docs", "credentials", "slack"]

[[rules]]
id = "session-discord-webhook"
description = "Discord Webhook URL in session docs"
regex = '''https://discord(app)?\.com/api/webhooks/\d+/[A-Za-z0-9_-]+'''
tags = ["session-docs", "credentials", "discord"]

# ================================
# MEDIUM PRIORITY RULES (P2)
# ================================

[[rules]]
id = "session-email-real"
description = "Real email addresses in session docs (not example domains)"
regex = '''[a-zA-Z0-9._%+-]+@(?!example\.(com|org|net))[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}'''
tags = ["session-docs", "pii", "email"]
[rules.allowlist]
regexes = [
    '''noreply@''',
    '''no-reply@''',
    '''bot@''',
    '''github-actions@''',
]

[[rules]]
id = "session-absolute-home-path"
description = "Absolute home directory path in session docs"
regex = '''/home/[a-zA-Z0-9_-]+/(\.)?[a-zA-Z0-9_.-]+'''
tags = ["session-docs", "path", "exposure"]
[rules.allowlist]
regexes = [
    '''/home/user/''',
    '''/home/example/''',
]

[[rules]]
id = "session-cert-pem"
description = "PEM certificate content in session docs"
regex = '''-----BEGIN CERTIFICATE-----'''
tags = ["session-docs", "credentials", "certificate"]

[[rules]]
id = "session-docker-auth"
description = "Docker registry authentication in session docs"
regex = '''(?i)docker\s+login.*-p\s+[^\s]+'''
tags = ["session-docs", "credentials", "docker"]

[[rules]]
id = "session-env-var-secret"
description = "Environment variable with secrets in session docs"
regex = '''(?i)(export\s+)?(SECRET|TOKEN|PASSWORD|API_KEY|APIKEY)=[^\s]+'''
tags = ["session-docs", "credentials", "env"]
[rules.allowlist]
regexes = [
    '''=(YOUR_|REPLACE_WITH|<|example|sample|\*+)''',
]

# ================================
# INFORMATIONAL RULES (P3)
# ================================

[[rules]]
id = "session-production-url"
description = "Potential production URLs in session docs"
regex = '''https?://[\w.-]*(prod|production|api|www)[\w.-]*\.(com|io|net|org)/[^\s'"]*'''
tags = ["session-docs", "infrastructure", "url"]
[rules.allowlist]
paths = [
    '''docs/SESSIONS/.*/SESSION_RECOVERY_.*\.md''',  # URLs OK in recovery docs (context)
]

[[rules]]
id = "session-jwt-structure"
description = "JWT-like structure (possibly real token) in session docs"
regex = '''[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}'''
tags = ["session-docs", "credentials", "jwt-like"]
[rules.allowlist]
regexes = [
    '''eyJ''',  # Already caught by session-jwt-token rule
]
