services:
  api:
    build: .
    container_name: vya-api
    ports:
      - "8700:8700"
    env_file: .env            # VYA_API_KEY + chaves de provider
    volumes:
      - ./data/profiles:/app/profiles
    restart: unless-stopped

  dashboard:
    build: .
    container_name: vya-dashboard
    # --insecure é necessário para bindar fora de localhost dentro do container;
    # o acesso continua protegido pelo login/pareamento do próprio dashboard.
    # Em produção, prefira expor via reverse proxy com TLS.
    command: >
      /app/hermes-agent/venv/bin/hermes dashboard
      --host 0.0.0.0 --insecure --no-open --skip-build
    environment:
      - HERMES_HOME=/app/profiles/dashboard
    ports:
      - "9119:9119"
    volumes:
      - ./data/profiles:/app/profiles
    restart: unless-stopped
