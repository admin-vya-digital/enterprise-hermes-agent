<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vya-agent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎼</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Danfo&family=Eagle+Lake&family=Monoton&family=Zen+Dots&display=swap" rel="stylesheet">
<style>
:root {
  --bg0:#2B1A12; --bg1:#112A15; --bg2:#1D3B24; --bg3:#3d2010;
  --t1:#FFFFFF; --t2:#F6F1E7; --t3:rgba(246,241,231,.65); --t4:rgba(246,241,231,.38);
  --brand:#C9A227; --accent:#C9A227; --accent-h:#A56A2A;
  --green:#27a644; --red:#ff453a; --orange:#ff9f0a;
  --b3:rgba(201,162,39,.18); --b4:rgba(201,162,39,.08);
  --card:rgba(17,42,21,.7); --card-h:rgba(29,59,36,.7);
  --overlay:rgba(43,26,18,.88);
  --r:8px;
  --vya-agent-blob1:rgb(201,162,85);--vya-agent-blob2:rgb(229,205,175);
}
#vyaAgentTitle{position:relative;overflow:hidden}
#vyaAgentTitle::before,#vyaAgentTitle::after{
  content:'';position:absolute;
  width:160%;height:160%;
  border-radius:50%;
  filter:blur(8px);opacity:.7;
  pointer-events:none;z-index:0
}
#vyaAgentTitle::before{
  top:-30%;left:-20%;
  background:radial-gradient(ellipse at center,var(--vya-agent-blob1) 0%,transparent 70%);
  animation:vyaAgentFluid1 5s ease-in-out infinite alternate;
}
#vyaAgentTitle::after{
  top:-40%;left:10%;
  background:radial-gradient(ellipse at center,var(--vya-agent-blob2) 0%,transparent 65%);
  animation:vyaAgentFluid2 4s ease-in-out infinite alternate;
}
#vyaAgentTitle span{position:relative;z-index:1}
@keyframes vyaAgentFluid1{
  0%  {transform:translate(0,0) scale(1)}
  100%{transform:translate(30%,20%) scale(1.2)}
}
@keyframes vyaAgentFluid2{
  0%  {transform:translate(10%,5%) scale(0.9)}
  100%{transform:translate(-25%,-15%) scale(1.15)}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{zoom:1.33;width:calc(100vw / 1.33);height:calc(100dvh / 1.33);overflow:hidden}
body{background:var(--bg0);color:var(--t1);font-family:Inter,system-ui,-apple-system,sans-serif;font-size:13px;height:100%;overflow:hidden;display:flex;flex-direction:column}
/* Clicking/dragging across UI chrome (buttons, nav, headers, avatars) native-selects text by default -- these are never meant to be selected, only clicked. Real content (messages, memory, logs, textareas) is untouched. */
button,.nav-btn,.conv-avatar,.cp-header,.cp-section-title,.lead-sidebar-header,.lead-info-label,.badge,h1,h2,h3,label{user-select:none}

/* ── Layout ── */
.app{display:flex;flex:1;overflow:hidden;height:100%}

/* ── Sidebar: Profiles ── */
.sidebar{position:relative;width:200px;min-width:160px;background:var(--bg1);border-right:1px solid var(--bg3);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-header{padding:14px 14px 10px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t4);border-bottom:1px solid var(--bg3);display:flex;align-items:center;gap:6px}
.user-badge{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;font-weight:500;text-transform:none;letter-spacing:0}
.pane-scroll{overflow-y:auto;flex:1}
/* Filho do #funZone com inset:0 — cobre exatamente a área da aurora por
   contenção CSS pura (nenhuma coordenada calculada em JS; imune a zoom/
   escala de ancestrais). Animação por opacity/transform, fora do layout. */
.theme-drawer{
  /* 50% translúcido pra aurora do funZone aparecer por trás */
  position:absolute;inset:0;z-index:5;
  background:color-mix(in srgb, var(--bg1) 50%, transparent);
  border-top:1px solid var(--bg3);overflow-y:auto;
  visibility:hidden;opacity:0;transform:translateY(10px);
  transition:opacity .18s ease,transform .18s ease,visibility 0s linear .18s;
}
.theme-drawer.open{
  visibility:visible;opacity:1;transform:none;
  transition:opacity .18s ease,transform .18s ease;
}
/* ── funZone: aurora interativa entre Ações e Temas ── */
#funZone{position:relative}
#funZone canvas{
  position:absolute;inset:0;width:100%;height:100%;display:block;
  filter:blur(11px) saturate(1.25);
  -webkit-mask-image:linear-gradient(180deg,transparent,#000 16%,#000 84%,transparent);
  mask-image:linear-gradient(180deg,transparent,#000 16%,#000 84%,transparent);
}
.sidebar-footer{flex-shrink:0;border-top:1px solid var(--bg3);padding:6px 10px}
/* status do perfil na barra da sidebar (uptime no title=hover) */
.sb-dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--bg3);cursor:help}
.sb-dot.green{background:var(--green);box-shadow:0 0 6px var(--green)}
.sb-dot.orange{background:var(--orange)}
.sb-dot.red{background:var(--red)}
.sb-profiles{border-bottom:1px solid var(--bg3);padding:6px 10px;display:flex;flex-direction:column;gap:4px}
.sb-profile-chip{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:6px 9px;cursor:pointer;color:var(--t2);font-size:11px;font-family:inherit;text-align:left;transition:border-color .15s}
.sb-profile-chip:hover{border-color:var(--brand)}
.sb-profile-chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-profiles-empty{font-size:10px;color:var(--t4);padding:2px 2px 4px}
.profile-item{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .12s}
.profile-item:hover{background:var(--bg2)}
.profile-item.active{background:var(--bg2);border-left-color:var(--brand)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot-red{background:var(--red)}
.dot-orange{background:var(--orange)}
.profile-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-sub{font-size:10px;color:var(--t4);margin-top:1px}

/* ── Workspace (right of sidebar) ── */
.workspace{display:flex;flex:1;flex-direction:column;overflow:hidden;min-width:0}

/* ── Sidebar nav (abas) ── */
.nav-list{padding:6px 0}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 14px;font-size:12px;font-weight:500;color:var(--t4);background:none;border:none;border-left:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;text-align:left;transition:color .15s,border-color .15s,background .12s}
.nav-btn:hover{color:var(--t2);background:var(--bg2)}
.nav-btn.active{color:var(--t1);border-left-color:var(--brand);background:var(--bg2)}
.nav-btn.dirty::after{content:'●';font-size:7px;color:var(--orange);margin-left:5px;vertical-align:super}
/* legacy: paginação DB etc. */
.tab-btn{padding:6px 11px;font-size:12px;font-weight:500;color:var(--t4);background:none;border:1px solid var(--bg3);border-radius:var(--r);cursor:pointer;white-space:nowrap;font-family:inherit;transition:color .15s,border-color .15s}
.tab-btn:hover{color:var(--t2);border-color:var(--t3)}

/* ── Tab content wrapper ── */
.tab-content{flex:1;overflow:hidden;display:flex}

/* ── Overview: seletor de perfis dentro do card ── */

/* Altura padrão dos headers de topo (busca de conversas, painel de contato/dia) */
.conv-toolbar,.cp-header{min-height:56px;box-sizing:border-box}

/* ── Painel lateral: info do contato ── */
.contact-panel{width:300px;min-width:260px;background:var(--bg1);border-left:1px solid var(--bg3);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.cp-header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.cp-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:18px}
.cp-section-title{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t4);margin-bottom:7px}
.cp-row{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:4px 0}
.cp-row .k{color:var(--t4);flex-shrink:0}
.cp-row .v{color:var(--t2);text-align:right;word-break:break-all}
.cp-empty{font-size:11px;color:var(--t4)}

/* ── Agenda: calendário ── */
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cal-title{font-size:14px;font-weight:600;color:var(--t1);text-transform:capitalize;flex:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--t4);text-align:center;padding:4px 0}
.cal-day{position:relative;background:var(--bg1);border:1px solid var(--bg2);border-radius:6px;min-height:64px;padding:6px 7px;font-size:11px;color:var(--t3);display:flex;flex-direction:column}
.cal-badge{flex:1;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--brand)}
.cal-day.other{opacity:.32}
.cal-day.today{border-color:var(--brand)}
.cal-day.today .cal-num{background:var(--brand);color:var(--bubble-fg,#fff);border-radius:50%;width:19px;height:19px;display:inline-flex;align-items:center;justify-content:center}
.cal-num{font-weight:600;color:var(--t2)}
.cal-day.sel{border-color:var(--brand);background:var(--bg2)}
.cal-day:not(.other){cursor:pointer;transition:background .12s,border-color .12s}
.cal-day:not(.other):hover{background:var(--bg2)}

/* Painel do dia (Agenda): listagem por hora */
.hour-row{display:flex;gap:10px;padding:6px 2px;border-bottom:1px solid var(--bg2);cursor:pointer;transition:background .12s}
.hour-row:hover{background:var(--bg2)}
.hour-label{font-size:10px;color:var(--t4);font-family:'Courier New',monospace;width:38px;flex-shrink:0;padding-top:2px}
.hour-body{flex:1;min-width:0;font-size:11px;color:var(--t3)}
.hour-evt{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t1);font-weight:500}
.hour-evt-cont{opacity:.7;font-weight:400}
.hour-evt-cont-bar{color:var(--t4);opacity:.5;font-size:11px;line-height:1;padding-left:1px}
.hour-row.spanned{border-left:2px solid var(--brand);margin-left:-2px}
.hour-row.spanned-mid{background:var(--bg2);border-left-color:var(--t4);opacity:.6}
.hour-row.spanned-mid:hover{opacity:.85}
.hour-row.spanned-mid .hour-label{color:var(--t4);opacity:.6}
.hour-row.spanned-last{border-left:2px solid var(--brand);margin-left:-2px}
.hour-detail{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:8px 10px;margin:4px 0 6px 48px;font-size:11px;color:var(--t2)}

/* ── CONVERSAS tab: 2-pane ── */
.pane-convs{width:280px;min-width:220px;background:var(--bg1);border-right:1px solid var(--bg3);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.conv-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--bg3);gap:6px}
.conv-search input{width:100%;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);color:var(--t1);padding:5px 9px;font-size:12px;outline:none;font-family:inherit}
.conv-search input:focus{border-color:var(--brand)}
.conv-search input::placeholder{color:var(--t4)}
.conv-item{display:flex;align-items:flex-start;gap:9px;padding:10px 12px;cursor:pointer;border-left:2px solid transparent;border-bottom:1px solid var(--bg2);transition:background .12s}
.conv-item:hover{background:var(--bg2)}
.conv-item.active{background:var(--bg2);border-left-color:var(--brand)}
.conv-avatar{width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;text-transform:uppercase}
.conv-body{min-width:0;flex:1}
.conv-top{display:flex;justify-content:space-between;align-items:baseline;gap:4px}
.conv-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.conv-time{font-size:10px;color:var(--t4);flex-shrink:0}
.conv-title{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-meta{display:flex;gap:5px;margin-top:4px;align-items:center}

/* Thread */
.pane-thread{flex:1;min-width:0;background:var(--bg0);display:flex;flex-direction:column;overflow:hidden}
.thread-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:8px}
.msg-row{display:flex;align-items:flex-end;gap:8px;max-width:80%}
.msg-row.user{align-self:flex-start}
.msg-row.assistant{align-self:flex-end;flex-direction:row-reverse}
.msg-row.system{align-self:center;max-width:90%}
.msg-row.tool{align-self:flex-start;max-width:90%}
.bubble{padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word;white-space:pre-wrap;max-width:100%}
.msg-row.user .bubble{background:var(--bg2);border:1px solid var(--bg3);color:var(--t1);border-bottom-left-radius:3px}
.msg-row.assistant .bubble{background:var(--brand);color:var(--bubble-fg,#fff);border-bottom-right-radius:3px}
.msg-row.system .bubble{background:transparent;border:1px solid var(--bg3);color:var(--t4);font-size:11px;text-align:center;width:100%;border-radius:6px}
.msg-row.tool .bubble{background:var(--bg1);border:1px solid var(--bg3);color:var(--t3);font-size:11px;font-family:'Courier New',monospace;max-height:120px;overflow-y:auto;border-radius:6px}
.msg-row.internal{align-self:flex-end;flex-direction:row-reverse;opacity:.55}
.msg-row.internal .bubble{background:transparent;border:1px dashed var(--bg3);color:var(--t3);border-bottom-right-radius:3px}
.internal-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--t4);margin-bottom:3px;text-align:right}
.msg-avatar{width:24px;height:24px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t3);flex-shrink:0}
.msg-ts{font-size:10px;color:var(--t4);margin-top:3px;text-align:right}
.msg-row.user .msg-ts{text-align:left}
.tool-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--t4);margin-bottom:3px}

/* ── GENERIC tab content ── */
.tab-page{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;min-width:0}

/* ── Overview cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.ov-cards{grid-template-columns:repeat(6,1fr)}
.ov-two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex-shrink:0}
.card{background:var(--bg1);border:1px solid var(--b3);border-radius:var(--r);padding:14px 16px}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);margin-bottom:6px}
.card-value{font-size:22px;font-weight:700;color:var(--t1)}
.card-sub{font-size:11px;color:var(--t4);margin-top:3px}
.card.green .card-value{color:var(--green)}
.card.brand .card-value{color:var(--accent)}
/* ── Overview redesign: hero do dia ── */
.ov-day-title{font-size:17px;font-weight:700;letter-spacing:.04em;color:var(--t2);margin-bottom:8px}
.ov-hero-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
.ov-next{background:var(--bg1);border:1px solid var(--brand);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:background .15s}
.ov-next:hover{background:var(--bg2)}
.ov-next-when{font-size:26px;font-weight:700;color:var(--brand);line-height:1.15}
.ov-next-who{font-size:16px;font-weight:600;color:var(--t1);margin-top:2px}
.ov-next-what{font-size:12px;color:var(--t3);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ov-next-empty{border-color:var(--bg3);cursor:default}
.ov-next-free{font-size:14px;color:var(--t4);margin-top:8px}
.ov-kpi{cursor:pointer;transition:border-color .15s}
.ov-kpi:hover{border-color:var(--brand)}
.ov-kpi-big{font-size:30px}
.card.warn .card-value{color:var(--orange)}
.card.sm{padding:6px 12px}
.card.sm .card-label{margin-bottom:1px}
.card.sm .card-value{font-size:16px}
.card.sm .card-sub{font-size:9px;line-height:1.25}
/* painel genérico e seções */
.ov-panel{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:10px 14px}
/* overview preenche a tela, sem scroll da página (desktop); listas rolam por dentro */
.ov-wrap{overflow:hidden}
.ov-main{grid-template-columns:1fr 1fr;flex:1;min-height:0}
.ov-agenda-box,.ov-att-box{display:flex;flex-direction:column;min-height:0}
.ov-agenda-box .ov-panel,.ov-att-box .ov-panel{flex:1;min-height:0;overflow-y:auto}
.ov-bottom>div{min-height:0}
.ov-bottom .ov-panel{flex:1;min-height:0}
.ov-week{grid-template-columns:repeat(5,1fr)}
.ov-agenda-row{display:flex;align-items:center;gap:10px;padding:7px 0 7px 6px;border-bottom:1px solid var(--bg2);cursor:pointer}
.ov-agenda-row:hover{background:var(--bg2)}
.ov-agenda-row.today{border-left:3px solid var(--brand);padding-left:8px}
/* precisa de atenção */
.ov-att{display:flex;flex-direction:column;gap:6px;padding:8px}
.ov-att-item{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:10px 12px;cursor:pointer;font-family:inherit;font-size:12px;color:var(--t2);text-align:left;transition:border-color .15s}
.ov-att-item:hover{border-color:var(--brand)}
.ov-att-item.warn{border-left:3px solid var(--orange)}
.ov-att-item.brand{border-left:3px solid var(--brand)}
.ov-att-txt{flex:1}
.ov-att-cta{color:var(--brand);font-weight:600;white-space:nowrap}
.ov-att-empty{padding:14px;font-size:12px;color:var(--green);text-align:center}
.ov-prof-card{grid-column:span 2;align-items:stretch;text-align:left;justify-content:flex-start;gap:8px;transition:background .15s}
.ov-prof-card:hover{background:var(--bg2);border-color:var(--b3)}
.ov-prof-list{display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.ov-prof-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:7px 10px;cursor:pointer;font:inherit;color:var(--t2);text-align:left;transition:border-color .12s}
.ov-prof-row:hover{border-color:var(--brand)}
.ov-prof-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ov-prof-count{font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;display:flex;align-items:center;gap:4px}
.ov-prof-go{color:var(--brand)}
.av-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.ov-funnel{cursor:pointer;transition:border-color .15s}
.ov-funnel:hover{border-color:var(--brand)}

/* ── Editor (SOUL / produto) ── */
.editor-wrap{display:flex;flex-direction:column;flex:1;gap:10px}
.editor-header{display:flex;align-items:center;justify-content:space-between}
.editor-title{font-size:13px;font-weight:600;color:var(--t2)}
.editor-hint{font-size:11px;color:var(--t4)}
textarea.editor{flex:1;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);color:var(--t1);padding:14px;font-size:13px;font-family:'Courier New',monospace;line-height:1.6;resize:none;outline:none;min-height:0}
textarea.editor:focus{border-color:var(--brand)}
.soul-nav{width:180px;flex-shrink:0;border-right:1px solid var(--bg3);display:flex;flex-direction:column;overflow:hidden}
.soul-nav-header{padding:10px 12px 6px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t4);flex-shrink:0}
.soul-nav-list{flex:1;overflow-y:auto;padding-bottom:8px}
.soul-nav-item{padding:5px 12px;font-size:11px;color:var(--t3);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid transparent;transition:color .12s,border-color .12s}
.soul-nav-item:hover{color:var(--t1);border-left-color:var(--brand);background:var(--bg2)}

/* ── Produto (form estruturado) ── */
.prod-wrap{max-width:780px;margin:0 auto;width:100%}
.pcard{background:var(--bg1);border:1px solid var(--b3);border-radius:var(--r);padding:16px 18px;margin-bottom:16px}
.pcard-desc{font-size:11px;color:var(--t4);margin:-2px 0 12px}
.pgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
@media(max-width:640px){.pgrid2{grid-template-columns:1fr}}
.pfld{display:flex;flex-direction:column;gap:4px}
.pfld-k{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--t4)}
.pfld-in{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);color:var(--t1);padding:7px 10px;font:inherit;font-size:12px;outline:none;width:100%}
.pfld-in:focus{border-color:var(--brand)}
.pfld-in.invalid{border-color:var(--red)}
.pchips{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.pchip{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--t2);cursor:default}
.pchip .x{cursor:pointer;color:var(--t4);font-weight:700}
.pchip .x:hover{color:var(--red)}
.pchip.toggle{cursor:pointer}
.pchip.on{background:color-mix(in srgb,var(--brand) 20%,transparent);border-color:var(--brand);color:var(--t1)}
.pchip-add{border-style:dashed;cursor:pointer;color:var(--t3)}
.pchip-add:hover{border-color:var(--brand);color:var(--t1)}
.pday-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px}
.pday-row.closed{opacity:.45}
.pday-lbl{width:44px;color:var(--t2);font-weight:600}
.pday-chips{display:flex;gap:5px}
.dchip{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--bg2);color:var(--t4);border:1px solid var(--bg3);cursor:pointer;user-select:none}
.dchip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.ptoggle{position:relative;width:34px;height:18px;border-radius:10px;background:var(--bg3);cursor:pointer;flex-shrink:0;transition:background .15s}
.ptoggle.on{background:var(--brand)}
.ptoggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--bg0);transition:left .15s}
.ptoggle.on::after{left:18px}
.ptime{width:74px}
.psvc-cat{font-size:10px;padding:2px 7px}
.prow-add{margin-top:8px}
.pprof{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);padding:12px;margin-bottom:10px}
.pfact{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:var(--r);padding:7px 10px;margin-bottom:6px;font-size:12px;color:var(--t2)}
.pfact .grow{flex:1}
/* Mapa de Capacidade */
.cap-grid{display:grid;gap:3px}
.cap-hd{font-size:10px;text-transform:uppercase;color:var(--t4);text-align:center;font-weight:700}
.cap-rowlbl{font-size:10px;color:var(--t4);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.cap-cell{border-radius:5px;min-height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--t1);border:1px solid var(--bg3)}
.cap-closed{background:var(--bg1);color:var(--t4);border-style:dashed}
.cap-gap{background:color-mix(in srgb,var(--orange) 28%,transparent);border-color:var(--orange);color:var(--t1)}
.cap-legend{font-size:11px;color:var(--t3);margin-top:10px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.cap-swatch{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:-2px;margin-right:4px}

/* ── Cron ── */
.section-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t4);margin-bottom:8px}
.cron-empty{background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:20px;color:var(--t4);font-size:12px;text-align:center}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--bg2)}
.tl-item:last-child{border-bottom:none}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:0;padding-top:4px}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tl-dot.ok{background:var(--green)}
.tl-dot.err{background:var(--red)}
.tl-dot.run{background:var(--orange)}
.tl-line{width:1px;flex:1;background:var(--bg3);margin-top:4px}
.tl-body{flex:1;min-width:0}
.tl-time{font-size:11px;color:var(--t4)}
.tl-id{font-size:11px;color:var(--t3);font-family:'Courier New',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.tl-meta{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.tl-tag{font-size:10px;color:var(--t4)}

/* ── Logs ── */
.log-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.log-box{flex:1;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);padding:12px;font-family:'Courier New',monospace;font-size:11px;line-height:1.6;overflow-y:auto;white-space:pre-wrap;word-break:break-all;min-height:300px;max-height:calc(100vh - 240px);color:var(--t2)}
.log-line.err{color:var(--red)}
.log-line.warn{color:var(--orange)}
.log-line.info{color:var(--t2)}
.log-line.debug{color:var(--t4)}

/* ── Contacts ── */
.contacts-search{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);color:var(--t1);padding:7px 11px;font-size:12px;outline:none;font-family:inherit;width:280px}
.contacts-search:focus{border-color:var(--brand)}
.contacts-search::placeholder{color:var(--t4)}
table.ct{width:100%;border-collapse:collapse}
table.ct th{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--t4);font-weight:600;text-align:left;padding:7px 10px;border-bottom:1px solid var(--bg3)}
table.ct td{padding:8px 10px;font-size:12px;color:var(--t2);border-bottom:1px solid var(--bg2)}
table.ct tr:hover td{background:var(--bg2)}
table.ct td.mono{font-family:'Courier New',monospace;font-size:11px;color:var(--t3)}

/* ── Kanban de Leads ── */
.kanban-board{display:flex;gap:16px;overflow-x:auto;padding:16px;flex:1;min-height:0}
.kanban-column{min-width:280px;background:var(--bg1);border:1px solid var(--bg3);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.kanban-header{padding:12px 14px;border-bottom:1px solid var(--bg3);flex-shrink:0}
.kanban-title{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:4px}
.kanban-count{font-size:11px;color:var(--t4)}
.kanban-stack{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.lead-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:10px;cursor:pointer;transition:border-color .12s,background .12s;user-select:none}
.lead-card:hover{background:var(--bg3);border-color:var(--brand)}
.lead-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-phone{font-size:11px;color:var(--t4);margin-top:2px;font-family:'Courier New',monospace}
.lead-score{font-size:10px;color:var(--orange);margin-top:4px}
.lead-score-bar{width:100%;height:3px;background:var(--bg1);border-radius:2px;overflow:hidden;margin-top:2px}
.lead-score-fill{height:100%;background:var(--orange);transition:width .2s}

/* ── Sidebar de Lead ── */
.lead-sidebar{position:absolute;right:0;top:0;width:320px;height:100%;background:var(--bg1);border-left:1px solid var(--bg3);display:flex;flex-direction:column;overflow:hidden;z-index:10;box-shadow:-2px 0 8px rgba(0,0,0,.3);transform:translateX(100%);transition:transform .25s ease}
.lead-sidebar.open{transform:translateX(0)}
.lead-sidebar-header{padding:12px 14px;border-bottom:1px solid var(--bg3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lead-sidebar-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.lead-sidebar-close:hover{color:var(--t1)}
.lead-sidebar-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.lead-info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg2)}
.lead-info-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--t4)}
.lead-info-value{font-size:12px;color:var(--t2)}
.lead-phase-select{width:100%;background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;color:var(--t1);padding:6px 8px;font-size:12px;outline:none;font-family:inherit;cursor:pointer}
.lead-phase-select:focus{border-color:var(--brand)}
.lead-memory{font-size:11px;color:var(--t3);line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;background:var(--bg2);padding:8px;border-radius:6px;font-family:'Courier New',monospace}

/* ── Ações ── */
.actions-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.action-card{background:var(--bg1);border:1px solid var(--b3);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:10px}
.action-card h3{font-size:13px;font-weight:600;color:var(--t1)}
.action-card p{font-size:12px;color:var(--t3);line-height:1.5}
.qr-img{width:200px;height:200px;border-radius:var(--r);border:1px solid var(--bg3)}

/* ── Common UI ── */
.btn-p{background:var(--brand);color:#fff;border:none;border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-p:hover{opacity:.85}
.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:none;border:1px solid var(--bg3);color:var(--t3);border-radius:var(--r);padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;transition:color .15s,border-color .15s;display:inline-flex;align-items:center;gap:5px}
.btn-g:hover{color:var(--t1);border-color:var(--t3)}
.btn-d{background:none;border:1px solid var(--red);color:var(--red);border-radius:var(--r);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-d:hover{background:var(--red);color:#fff}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.badge-wa{background:#1aaa5533;color:#1aaa55}
.badge-cron{background:#5e6ad233;color:#9ea6f0}
.badge-tg{background:#2196f333;color:#64b5f6}
.badge-def{background:var(--bg3);color:var(--t4)}
.badge-green{background:#27a64422;color:var(--green)}
.badge-red{background:#ff453a22;color:var(--red)}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t4);gap:8px;padding:40px 0}
.empty-state svg{opacity:.3}
.empty-state p{font-size:12px}
.spin{width:16px;height:16px;border:2px solid var(--bg3);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast-wrap{position:fixed;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--t1);display:flex;align-items:center;gap:8px;animation:fadein .2s;max-width:300px}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid var(--red)}
.toast.warn{border-left:3px solid var(--orange)}
@keyframes fadein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}

/* ══ MOBILE (≤768px) ═══════════════════════════════════════════════════════
   Desktop intocado: tudo abaixo só vale dentro da media query. Elementos
   mobile-only (topbar, backdrop, cabeçalho da thread, botões voltar) existem
   sempre no DOM mas ficam display:none fora dela. */
.m-topbar{display:none}
.m-thread-head{display:none}
.m-back{display:none}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;opacity:0;pointer-events:none;transition:opacity .25s}
@media (max-width:768px){
  /* zoom 1.33 é hack de desktop — no celular quebra o viewport */
  html{zoom:1;width:100%;height:100dvh}
  body{font-size:14px}

  /* Topbar com hamburger + título */
  .m-topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg1);border-bottom:1px solid var(--bg3);flex-shrink:0}
  .m-burger{background:none;border:none;color:var(--t2);cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:4px}
  .m-burger span{display:block;width:20px;height:2px;background:currentColor;border-radius:2px}
  .m-title{font-size:17px;color:var(--vya-agent-title-bg,#8b7355);font-family:'Zen Dots','Monoton',cursive;line-height:1}
  .m-tabname{margin-left:auto;font-size:12px;color:var(--t3)}

  /* Sidebar vira drawer deslizante */
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:min(78vw,300px);min-width:0;z-index:200;transform:translateX(-100%);transition:transform .28s ease;box-shadow:4px 0 20px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{display:block}
  .sidebar-backdrop.show{opacity:1;pointer-events:auto}
  .nav-btn{padding:12px 16px;font-size:14px}

  /* Conteúdo genérico */
  .tab-content{position:relative}
  .tab-page{padding:14px;gap:14px}
  /* iOS dá zoom automático ao focar input com fonte <16px */
  input,textarea,select{font-size:16px!important}
  .toast-wrap{left:14px;right:14px;top:10px}
  .toast{max-width:none}

  /* ── WhatsApp: 3 telas paginadas (lista → conversa → dados) ── */
  .tab-content[data-tab="conversas"] .pane-convs,
  .tab-content[data-tab="conversas"] .pane-thread,
  .tab-content[data-tab="conversas"] .contact-panel{
    position:absolute;top:0;bottom:0;left:0;width:100%;min-width:0;max-width:none;
    border-left:none;border-right:none;
    transition:transform .28s ease;will-change:transform}
  .tab-content[data-tab="conversas"] .pane-thread{transform:translateX(100%)}
  .tab-content[data-tab="conversas"] .contact-panel{transform:translateX(100%)}
  .tab-content[data-tab="conversas"][data-mpane="thread"] .pane-convs{transform:translateX(-30%)}
  .tab-content[data-tab="conversas"][data-mpane="thread"] .pane-thread{transform:translateX(0)}
  .tab-content[data-tab="conversas"][data-mpane="info"] .pane-convs{transform:translateX(-30%)}
  .tab-content[data-tab="conversas"][data-mpane="info"] .pane-thread{transform:translateX(-30%)}
  .tab-content[data-tab="conversas"][data-mpane="info"] .contact-panel{transform:translateX(0)}
  .m-thread-head{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg1);border-bottom:1px solid var(--bg3);flex-shrink:0}
  .m-back{display:inline-flex;align-items:center;justify-content:center;background:none;border:none;color:var(--t2);font-size:24px;line-height:1;padding:0 8px 2px 2px;cursor:pointer;flex-shrink:0}
  .thread-messages{padding:12px}
  .msg-row{max-width:90%}

  /* ── Agenda: 2 telas paginadas (calendário+lembretes → horários do dia) ── */
  .tab-content[data-tab="agenda"] .tab-page,
  .tab-content[data-tab="agenda"] .contact-panel{
    position:absolute;top:0;bottom:0;left:0;width:100%;min-width:0;max-width:none;
    border-left:none;transition:transform .28s ease;will-change:transform}
  .tab-content[data-tab="agenda"] .contact-panel{transform:translateX(100%)}
  .tab-content[data-tab="agenda"][data-mpane="day"] .tab-page{transform:translateX(-30%)}
  .tab-content[data-tab="agenda"][data-mpane="day"] .contact-panel{transform:translateX(0)}
  .cal-day{min-height:48px;padding:4px 5px}

  /* ── Leads: colunas em rolagem horizontal; infos do lead sobem como
     bottom-sheet de 40% da tela, espremendo o kanban nos 60% de cima ── */
  .kanban-board{padding:10px;gap:10px;min-height:0}
  .kanban-column{min-width:80vw}
  .tab-content[data-tab="leads"] > div{flex-direction:column}
  .lead-sidebar{position:static;width:100%;height:0;min-height:0;transform:none;
    border-left:none;border-top:none;box-shadow:none;
    transition:height .25s ease;flex-shrink:0}
  .lead-sidebar.open{height:40%;transform:none;border-top:1px solid var(--bg3);box-shadow:0 -6px 16px rgba(0,0,0,.4)}

  /* ── Overview: cards 2 por linha; funil/agenda empilhados ── */
  .ov-wrap{padding:14px!important;overflow-y:auto}
  .ov-main{flex:none;min-height:auto}
  .ov-agenda-box .ov-panel,.ov-att-box .ov-panel{flex:none;overflow:visible}
  .ov-hero-grid{grid-template-columns:1fr 1fr}
  .ov-next{grid-column:1 / -1}
  .ov-two-col,.ov-main{grid-template-columns:1fr}
  .ov-main{display:flex;flex-direction:column}
  .ov-att-box{order:-1}
  .ov-week{grid-template-columns:repeat(2,1fr)}
  .ov-next-when{font-size:22px}

  /* ── Editor SOUL/produto: sem nav lateral de seções ── */
  .soul-nav{display:none}

  /* ── Contatos: tabela rola na horizontal ── */
  .tab-content[data-tab="contatos"] .tab-page{overflow-x:auto}
  table.ct{min-width:640px}
  .contacts-search{width:100%}

  /* ── Overview / logs ── */
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .log-box{max-height:none}

  /* ── Passe de tamanhos: sensação de app (desktop compensa com zoom 1.33,
     no mobile os px crus de 10-13px ficam pequenos demais; +15-20% aqui) ── */
  body{font-size:15px}
  .bubble{font-size:15px;padding:9px 13px}
  .msg-row.system .bubble,.msg-row.tool .bubble{font-size:12px}
  .msg-ts{font-size:11px}
  .tool-label,.internal-label{font-size:10px}
  .conv-item{padding:12px 14px}
  .conv-name{font-size:14px}
  .conv-preview{font-size:13px}
  .conv-time{font-size:11px}
  .section-title,.cp-section-title{font-size:12px}
  .card-label{font-size:11px}
  .card-value{font-size:24px}
  .card.sm .card-value{font-size:20px}
  .card-sub{font-size:12px}
  .badge{font-size:11px;padding:3px 7px}
  table.ct th{font-size:11px}
  table.ct td{font-size:13px;padding:10px 12px}
  table.ct td.mono{font-size:12px}
  .lead-name{font-size:14px}
  .m-tabname{font-size:13px}
  .ov-next-who{font-size:17px}
  .ov-next-what{font-size:13px}
  .ov-att-item{font-size:13px;padding:12px 14px}
  .ov-att-empty{font-size:13px}
  .ov-day-title{font-size:16px}
  .ov-agenda-row div{font-size:13px!important}
  .ov-agenda-row div div:last-child{font-size:11px!important}
  .ov-panel [style*="font-size:11px"]{font-size:13px!important}
  .ov-panel [style*="font-size:10px"]{font-size:11px!important}
}
</style>
</head>
<body>

<!-- Topbar mobile (hamburger abre o drawer da sidebar) — display:none no desktop -->
<div class="m-topbar">
  <button class="m-burger" onclick="toggleSidebar()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <span class="m-title">vya-agent</span>
  <span class="m-tabname" id="mTabName">Overview</span>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar(false)"></div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div id="vyaAgentTitle" style="padding:10px 14px;text-align:center;background:#8b7355;flex-shrink:0">
      <span style="font-size:32px;font-weight:400;letter-spacing:.04em;color:#1a1812;line-height:1;display:block;font-family:'Zen Dots','Monoton','Danfo','Eagle Lake',cursive">vya-agent</span>
    </div>
    <div class="sidebar-header">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span id="sidebarProfile" class="user-badge" style="max-width:104px;cursor:pointer" title="Perfil ativo — clique para trocar" onclick="toggleSbProfiles()">—</span>
      <svg id="sbChev" width="9" height="9" viewBox="0 0 10 10" fill="none" onclick="toggleSbProfiles()"

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  profiles: [],
  profile: null,     // active profile object
  tab: 'overview',
  convs: [], filteredConvs: [],
  session: null,
  dirty: { soul: false, produto: false },
};

// ── API ───────────────────────────────────────────────────────────────────────
// Todo path passado pra cá é montado com valores vindos do servidor
// (profile.id, chat_id etc.) — nunca deveria apontar pra fora da própria
// origem. Valida explicitamente antes de qualquer fetch: resolve contra
// location.origin e recusa qualquer coisa que não seja same-origin e sob
// /api/, fechando a possibilidade de um valor malicioso virar uma
// requisição pra host arbitrário. Toda chamada de fetch() no arquivo passa
// por aqui — não chamar fetch() direto em código novo.
function _apiUrl(path) {
  const url = new URL(path, window.location.origin);
  if (url.origin !== window.location.origin || !url.pathname.startsWith('/api/')) {
    throw new Error('Caminho de API inválido');
  }
  return url.toString();
}

async function api(path, opts = {}) {
  const r = await fetch(_apiUrl(path), opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function apiPost(path, body) {
  return api(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
}

// ── Agendamentos: rótulos/cores/ícones de status (compartilhado entre abas) ────
const APPT_STATUS_LABEL = { scheduled: 'Agendado', confirmed: 'Confirmado', completed: 'Concluído', cancelled: 'Cancelado' };
const APPT_STATUS_COLOR = { scheduled: 'var(--t3)', confirmed: 'var(--green)', completed: 'var(--t4)', cancelled: 'var(--red)' };
const APPT_STATUS_ICON = { scheduled: '📅', confirmed: '✔️', completed: '✅', cancelled: '❌' };

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Formatting ────────────────────────────────────────────────────────────────
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000), now = new Date();
  const h = (now - d) / 3600000;
  if (h < 24) return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  if (h < 168) return d.toLocaleDateString('pt-BR', { weekday: 'short' });
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

function fmtDateTime(ts) {
  if (!ts) return '';
  return new Date(ts * 1000).toLocaleString('pt-BR', {
    day: '2-digit', month: '2-digit', year: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}

function fmtUptime(sec) {
  if (sec == null) return '—';
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
  if (h >= 24) return `${Math.floor(h/24)}d ${h%24}h`;
  return h ? `${h}h ${m}m` : `${m}m`;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function avatarLetter(name) { return (name||'?').trim()[0].toUpperCase(); }
// WhatsApp profile picture for a DM contact, falling back to the letter
// avatar on load error (no picture set, private, or bridge/profile lookup
// failed) -- see /api/profiles/{id}/contact/avatar (cached on disk, bridge
// resolves live via Baileys profilePictureUrl()).
// Cache de sessão: cada contato tenta carregar a foto UMA vez por entrada no
// dashboard (re-renders da lista reusam o blob em memória, sem novo request).
// Sem foto (404/privada) fica marcado e cai na letra até o próximo reload.
const _avatarCache = new Map(); // "perfil|chatId" → {url: objectURL|null}
const _AV_IMG = url => `<img src="${url}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
function avatarImgHtml(chatId, name) {
  const letter = escHtml(avatarLetter(name));
  if (!chatId || !S.profile?.id) return letter;
  const key = `${S.profile.id}|${chatId}`;
  const hit = _avatarCache.get(key);
  if (hit) return `<span class="av-wrap" data-avkey="${escAttr(key)}">${hit.url ? _AV_IMG(hit.url) : letter}</span>`;
  _avatarCache.set(key, { url: null });          // marca a tentativa única
  fetch(_apiUrl(`/api/profiles/${S.profile.id}/contact/avatar?chat_id=${encodeURIComponent(chatId)}`))
    .then(r => (r.ok && (r.headers.get('content-type') || '').startsWith('image')) ? r.blob() : null)
    .then(b => {
      if (!b || !b.size) return;
      const url = URL.createObjectURL(b);
      _avatarCache.set(key, { url });
      document.querySelectorAll(`.av-wrap[data-avkey="${CSS.escape(key)}"]`)
        .forEach(el => { el.innerHTML = _AV_IMG(url); });
    }).catch(() => {});
  return `<span class="av-wrap" data-avkey="${escAttr(key)}">${letter}</span>`;
}

function fmtPhone(raw) {
  if (!raw) return '';
  const d = raw.replace(/\D/g, '');
  // Brazilian numbers: +55 + 2-digit DDD + 8 or 9 digit number
  if (d.startsWith('55') && d.length >= 12) {
    const ddd = d.slice(2, 4);
    const num = d.slice(4);
    const fmt = num.length === 9
      ? `${num.slice(0,5)}-${num.slice(5)}`
      : `${num.slice(0,4)}-${num.slice(4)}`;
    return `+55 (${ddd}) ${fmt}`;
  }
  // International: just add + prefix
  return `+${d}`;
}

function sourceBadge(src) {
  const map = { whatsapp:['badge-wa','WA'], cron:['badge-cron','Cron'], telegram:['badge-tg','TG'] };
  const [cls,lbl] = map[src] || ['badge-def', src||'?'];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

// ── Profiles ──────────────────────────────────────────────────────────────────
async function loadProfiles() {
  try {
    S.profiles = await api('/api/profiles');
    // Keep the active profile object fresh (status may have changed)
    if (S.profile) {
      const cur = S.profiles.find(p => p.id === S.profile.id);
      if (cur) S.profile = cur;
    }
    if (!S.profile && S.profiles.length) {
      selectProfileById(S.profiles[0].id);
      return;
    }
    _syncSidebarProfile();
  } catch { /* silent */ }
}

function _profileDotCls(p) {
  if (!p?.online) return 'dot-red';
  return p.whatsapp_state === 'connected' ? 'dot-green' : 'dot-orange';
}

function _syncSidebarProfile() {
  const el = document.getElementById('sidebarProfile');
  if (el) el.textContent = S.profile ? S.profile.id : '—';
  _syncSidebarStatus();
}

// Dots de status (gateway + WhatsApp) na barra do perfil; uptime só no hover (title).
function _syncSidebarStatus() {
  const p = S.profile;
  const gw = document.getElementById('sbDotGw');
  const wa = document.getElementById('sbDotWa');
  if (!gw || !wa) return;
  const up = p && p.uptime_sec != null ? ` há ${fmtUptime(p.uptime_sec)}` : '';
  gw.className = 'sb-dot ' + (p ? (p.online ? 'green' : 'red') : '');
  gw.title = p ? (p.online ? `Atendente: no ar${up}` : 'Atendente: fora do ar') : 'Atendente';
  wa.className = 'sb-dot ' + (p ? (!p.online ? 'red' : p.whatsapp_state === 'connected' ? 'green' : 'orange') : '');
  wa.title = p ? (`WhatsApp: ${p.whatsapp_state === 'connected' ? `conectado${up}` : (p.whatsapp_state || 'desconhecido')}`) : 'WhatsApp';
}

// Dropdown de troca de perfil na sidebar (substitui o antigo card do Overview).
function toggleSbProfiles() {
  const box = document.getElementById('sbProfiles');
  const chev = document.getElementById('sbChev');
  if (!box) return;
  if (box.style.display !== 'none') {
    box.style.display = 'none';
    if (chev) chev.style.transform = '';
    return;
  }
  if (chev) chev.style.transform = 'rotate(90deg)';
  const others = (S.profiles || []).filter(p => !S.profile || p.id !== S.profile.id);
  box.innerHTML = others.length
    ? others.map(p => `<button class="sb-profile-chip" onclick="toggleSbProfiles();selectProfileById('${escAttr(p.id)}')" title="Trocar para ${escHtml(p.id)}">
        <div class="dot ${_profileDotCls(p)}"></div>${escHtml(p.id)}
      </button>`).join('')
    : `<div class="sb-profiles-empty">Nenhum outro perfil nesta conta</div>`;
  box.style.display = 'flex';
}

function selectProfileById(id) {
  const p = S.profiles.find(x => x.id === id);
  if (!p) return;
  closeQrStream();
  S.profile = p;
  S.session = null;
  S.dirty = { soul: false, produto: false };
  S.groupInfo = {};
  _syncSidebarProfile();
  document.getElementById('noProfile').style.display = 'none';
  document.getElementById('profileWorkspace').style.display = 'flex';
  // Reset tabs dirty state
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('dirty'));
  setTab('overview');
}

// ── Mobile: drawer da sidebar + paginação da aba WhatsApp ─────────────────────
const TAB_LABELS = { overview:'Overview', conversas:'WhatsApp', agenda:'Agenda', leads:'Leads', contatos:'Contatos', soul:'Agente', produto:'Produto', dblogs:'DB & Logs', acoes:'Ações' };
function isMobile() { return window.matchMedia('(max-width:768px)').matches; }
function toggleSidebar(force) {
  const sb = document.querySelector('.sidebar');
  const bd = document.getElementById('sidebarBackdrop');
  if (!sb) return;
  const open = typeof force === 'boolean' ? force : !sb.classList.contains('open');

}
// Página ativa da aba WhatsApp no mobile: 'list' | 'thread' | 'info'.
// No desktop o atributo é ignorado (CSS só o lê dentro da media query).
function setMobilePane(p) {
  const el = document.getElementById('tabContent');
  if (el) el.dataset.mpane = p;
}

// ── Tab navigation ────────────────────────────────────────────────────────────
function setTab(tab) {
  if (tab !== 'acoes') closeQrStream();
  S.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });

function renderTab() {
  const el = document.getElementById('tabContent');
  // Conversas/Agenda usam layout em linha (painel lateral à direita)
  el.style.flexDirection = (S.tab === 'conversas' || S.tab === 'agenda') ? 'row' : 'column';
  el.style.overflow = 'hidden';
  el.dataset.tab = S.tab;      // CSS mobile por aba
  el.dataset.mpane = 'list';   // WhatsApp mobile sempre reabre na lista

  switch (S.tab) {
    case 'overview':  renderOverview(); break;
    case 'conversas': renderConversas(); break;
    case 'agenda':    renderAgenda(); break;
    case 'leads':     renderLeads(); break;
    case 'contatos':  renderContatos(); break;
    case 'soul':      renderEditor('soul', 'SOUL.md', 'Persona e instruções do agente'); break;
    case 'produto':   renderProduto(); break;
    case 'dblogs':    renderDBLogs(); break;
    case 'acoes':     renderAcoes(); break;
  }
}

// ── Chart ────────────────────────────────────────────────────────────────────
function renderMsgChart(data) {
  // Fill in missing days in the last 7 days
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }
  const byDay = Object.fromEntries(data.map(d => [d.day, d]));
  const rows = days.map(day => byDay[day] || { day, received: 0, sent: 0 });

  const maxVal = Math.max(...rows.map(r => r.received + r.sent), 1);
  const W = 560, H = 130;
  const pad = { top: 8, right: 8, bottom: 28, left: 32 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  const n = rows.length;
  const slotW = plotW / n;
  const barW = Math.max(Math.floor(slotW * 0.55), 6);

  // Y gridlines & labels
  const ticks = 4;
  let grids = '';
  for (let i = 0; i <= ticks; i++) {
    const v = Math.round(maxVal * i / ticks);
    const y = pad.top + plotH - (v / maxVal) * plotH;
    grids += `<line x1="${pad.left}" y1="${y}" x2="${W - pad.right}" y2="${y}" stroke="var(--b3)" stroke-width="1"/>`;
    if (i > 0) grids += `<text x="${pad.left - 4}" y="${y + 3}" text-anchor="end" font-size="9" fill="var(--t4)">${v}</text>`;
  }

  let sentBars = '', recvBars = '', labels = '';
  rows.forEach((r, i) => {
    const cx = pad.left + i * slotW + slotW / 2;
    const x = cx - barW / 2;
    const sentH = maxVal > 0 ? (r.sent / maxVal) * plotH : 0;
    const recvH = maxVal > 0 ? (r.received / maxVal) * plotH : 0;
    const sentY = pad.top + plotH - sentH;
    const recvY = sentY - recvH;
    sentBars += `<rect class="chart-bar-sent" x="${x}" y="${sentY}" width="${barW}" height="${Math.max(sentH, sentH > 0 ? 2 : 0)}" fill="var(--brand)" opacity=".85" rx="2" style="transition:opacity .2s,filter .2s"/>`;
    recvBars += `<rect class="chart-bar-recv" x="${x}" y="${recvY}" width="${barW}" height="${Math.max(recvH, recvH > 0 ? 2 : 0)}" fill="var(--green)" opacity=".75" rx="2" style="transition:opacity .2s,filter .2s"/>`;
    labels   += `<text x="${cx}" y="${H - 6}" text-anchor="middle" font-size="8" fill="var(--t4)">${r.day.slice(8)}/${r.day.slice(5,7)}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="display:block;width:100%;height:100%">
    ${grids}
    <g onmouseenter="_chartFocus('sent')" onmouseleave="_chartFocus(null)">${sentBars}</g>
    <g onmouseenter="_chartFocus('recv')" onmouseleave="_chartFocus(null)">${recvBars}</g>
    ${labels}
    <line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + plotH}" stroke="var(--b3)" stroke-width="1"/>
  </svg>`;
}

function _chartFocus(type) {
  const sent = document.querySelectorAll('.chart-bar-sent');
  const recv = document.querySelectorAll('.chart-bar-recv');
  const sentLeg = document.getElementById('chart-legend-sent');
  const recvLeg = document.getElementById('chart-legend-recv');
  const reset = el => { el.style.color = ''; el.style.background = ''; };
  const light = el => { el.style.color = 'var(--t1)'; el.style.background = 'var(--bg3)'; };
  if (!type) {
    sent.forEach(el => { el.style.opacity = ''; el.style.filter = ''; });
    recv.forEach(el => { el.style.opacity = ''; el.style.filter = ''; });
    if (sentLeg) reset(sentLeg);
    if (recvLeg) reset(recvLeg);
  } else if (type === 'sent') {
    sent.forEach(el => { el.style.opacity = '1'; el.style.filter = 'brightness(1.2)'; });
    recv.forEach(el => { el.style.opacity = '0.15'; el.style.filter = ''; });
    if (sentLeg) light(sentLeg); if (recvLeg) reset(recvLeg);
  } else {
    recv.forEach(el => { el.style.opacity = '1'; el.style.filter = 'brightness(1.2)'; });
    sent.forEach(el => { el.style.opacity = '0.15'; el.style.filter = ''; });
    if (recvLeg) light(recvLeg); if (sentLeg) reset(sentLeg);
  }
}

// ── TAB: Overview ─────────────────────────────────────────────────────────────
// "Hoje 16:00" / "Amanhã 09:00" / "12/07 14:00" a partir de unix ts (segundos)
function _ovWhen(ts) {
  const dt = new Date(ts * 1000), now = new Date();
  const d0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dd = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
  const diff = Math.round((dd - d0) / 86400000);
  const hm = dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  if (diff === 0) return `Hoje ${hm}`;
  if (diff === 1) return `Amanhã ${hm}`;
  return dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }) + ' ' + hm;
}
function _ovWhenIso(iso) {
  const t = Date.parse(iso);
  return isNaN(t) ? '' : _ovWhen(t / 1000);
}

// Funil de leads: barras finas de uma cor só (o comprimento carrega o valor;
// rótulo e número em tokens de texto, nunca na cor da série).
function _ovFunnel(funnel) {
  const total = PHASE_ORDER.reduce((a, p) => a + (funnel[p] || 0), 0);
  if (!total) return `<div class="cp-empty" style="padding:8px 0">Nenhum lead ainda.</div>`;
  const max = Math.max(1, ...PHASE_ORDER.map(p => funnel[p] || 0));
  return PHASE_ORDER.map(p => {
    const n = funnel[p] || 0;
    const w = Math.round(n / max * 100);
    return `<div style="display:flex;align-items:center;gap:10px;padding:5px 0">
      <div style="width:104px;flex-shrink:0;font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(PHASE_LABELS[p])}</div>
      <div style="flex:1;height:10px;background:var(--bg2);border-radius:4px;overflow:hidden">
        ${n ? `<div style="width:${w}%;height:100%;background:var(--brand);border-radius:0 4px 4px 0;transition:width .3s"></div>` : ''}
      </div>
      <div style="width:26px;text-align:right;font-size:11px;font-weight:600;color:${n ? 'var(--t2)' : 'var(--t4)'}">${n}</div>
    </div>`;
  }).join('');
}

// Lista dos próximos agendamentos (status como chip com rótulo, nunca só cor).

// Saudação do dia: "Bom dia! · sábado, 5 de julho" — 16 variações, sorteio
// determinístico por data (muda a cada dia, estável dentro do mesmo dia).
// O slot null é sensível ao período (dia/tarde/noite) pra nunca soar errado.
const OV_GREETINGS = [
  null, 'Olá! Tudo certo por aqui.', 'Que bom te ver por aqui!', 'Vamos ao trabalho!',
  'Tudo pronto por aqui!', 'Sua agenda te espera!', 'Mais um dia de agenda cheia?',
  'Que o dia renda!', 'Prontos para atender!', 'O atendimento não para!',
  'Bora fazer acontecer!', 'Tudo sob controle por aqui.', 'Seu assistente está a postos!',
  'Um ótimo dia de trabalho!', 'A agenda está por sua conta!', 'Novidades? Dá uma olhada abaixo.',
];
function _ovGreetIdx(dt) {
  const key = dt.getFullYear() * 10000 + (dt.getMonth() + 1) * 100 + dt.getDate();
  let h = key ^ 0x9e3779b9;                      // hash simples e estável por dia
  h = Math.imul(h ^ (h >>> 16), 0x45d9f3b);
  h = Math.imul(h ^ (h >>> 13), 0x45d9f3b);
  h = (h ^ (h >>> 16)) >>> 0;
  return h % OV_GREETINGS.length;
}
function _ovDayTitle() {
  const now = new Date();
  let idx = _ovGreetIdx(now);
  const yest = new Date(now); yest.setDate(yest.getDate() - 1);
  if (idx === _ovGreetIdx(yest)) idx = (idx + 1) % OV_GREETINGS.length;  // sem repetir 2 dias seguidos
  let g = OV_GREETINGS[idx];
  if (!g) {
    const hr = now.getHours();
    g = hr < 12 ? 'Bom dia!' : hr < 18 ? 'Boa tarde!' : 'Boa noite!';
  }
  const s = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  return g + ' · ' + s;
}

  S.groupInfo = S.groupInfo || {};

  const missing = ids.filter(id => !S.groupInfo[id]);

}

// Copy a phone number to the clipboard, with brief visual feedback on `el`.
function copyPhone(phone, el) {
  if (!phone) { if (el) flashChip(el, 'sem número'); return; }
  const digits = String(phone).replace(/[^\d+]/g, '');
  const done = () => flashChip(el, '✓ copiado');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(digits).then(done).catch(() => fallbackCopy(digits, done));
  } else { fallbackCopy(digits, done); }
}
function fallbackCopy(text, cb) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    cb && cb();
  } catch (e) {}
}
function flashChip(el, msg) {
  if (!el) return;
  const prevText = el.textContent, prevColor = el.style.color, prevTitle = el.getAttribute('title');
  el.textContent = msg; el.style.color = 'var(--green, #3fb950)';
  setTimeout(() => { el.textContent = prevText; el.style.color = prevColor; if (prevTitle) el.setAttribute('title', prevTitle); }, 1000);
}
function escAttr(s) {
  // Barra invertida PRIMEIRO: escapar aspa sem escapar \ antes permite que um
  // valor terminando em "\" neutralize o escape da aspa seguinte (ex.: nome
  // de contato do WhatsApp terminando em "\" + conteúdo malicioso quebraria
  // o literal de string JS dentro do onclick="...('${escAttr(x)}')").
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

async function togglePause() {
  const conv = S.session;
  if (!conv) return;
  const chatId = conv.chat_id || conv.user_id;
  if (!chatId) return;
  const btn = document.getElementById('pauseBtn');
  if (btn) { btn.disabled = true; btn.style.opacity = '.4'; }
  try {
    const endpoint = conv.paused ? 'resume' : 'pause';
    await apiPost(`/api/profiles/${S.profile.id}/contact/${endpoint}`, { chat_id: chatId });
    conv.paused = !conv.paused;
    // Update in the lists too
    const inConvs = S.convs.find(c => c.id === conv.id);
    if (inConvs) inConvs.paused = conv.paused;
    const inFiltered = S.filteredConvs.find(c => c.id === conv.id);
    if (inFiltered) inFiltered.paused = conv.paused;
    renderConvList();
    _renderPauseBtn(conv);
  } catch {
    toast('Erro ao alterar pausa', 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.style.opacity = ''; }
  }
}

function parseContent(content) {
  if (!content) return null;
  if (content.startsWith('[') || content.startsWith('{')) {
    try {
      const p = JSON.parse(content);
      if (Array.isArray(p)) return p.filter(b=>b.type==='text').map(b=>b.text||'').join('\n') || JSON.stringify(p,null,2);
      if (p.output !== undefined) return String(p.output);
      return JSON.stringify(p, null, 2);
    } catch {}
  }
  return content;
}

function renderMediaContent(text) {
  return text.replace(/MEDIA:([^\s\n]+)/g, (_, path) => {
    const name = path.split('/').pop();
    const ext = (name.split('.').pop()||'').toLowerCase();
    const icon = ['jpg','jpeg','png','gif','webp'].includes(ext)?'🖼':
                 ['mp4','mov','avi'].includes(ext)?'🎥':
                 ['mp3','ogg','aac'].includes(ext)?'🎵':'📎';
    return `${icon} <span style="color:var(--accent);font-size:11px">${escHtml(name)}</span>`;
  });
}

function renderMessages(msgs, conv) {
  const el = document.getElementById('threadMessages');
  if (!msgs.length) { el.innerHTML = `<div class="empty-state"><p>Sem mensagens</p></div>`; return; }
  const html = msgs.map(m => {
    const role = m.role || 'user';
    const content = parseContent(m.content);
    if (!content && role === 'assistant') return '';
    const ts = m.timestamp
      ? new Date(m.timestamp*1000).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
      : '';
    if (role === 'tool') {
      const snippet = (content||'').slice(0,400) + ((content||'').length>400?'…':'');
      return `<div class="msg-row tool"><div>
        <div class="tool-label">⚙ ${escHtml(m.tool_name||'tool')}</div>
        <div class="bubble">${escHtml(snippet)}</div>
        ${ts?`<div class="msg-ts">${ts}</div>`:''}
      </div></div>`;
    }
    if (role === 'system') return `<div class="msg-row system"><div class="bubble">⚙ system prompt</div></div>`;
    if (role === 'assistant' && m.has_tool_calls) {
      return `<div class="msg-row internal"><div>
        <div class="internal-label">💭 nota interna — não enviada ao cliente</div>
        <div class="bubble">${renderMediaContent(escHtml(content))}</div>
        ${ts?`<div class="msg-ts">${ts}</div>`:''}
      </div></div>`;
    }
    const letter = role==='user' ? avatarLetter(conv.contact_name||'U') : 'A';
    let displayContent = content || '';
    if (m._cron) {
      const jobName = m._cron_job_name || '';
      const sep = '─────────────────────';
      displayContent = `📢 Notificação 🔔\n${sep}\n\n${displayContent}`;
    }
    const rendered = renderMediaContent(escHtml(displayContent));
    const cronTag = m._cron ? `<span style="font-size:9px;color:var(--brand);opacity:.7;margin-left:4px">⏱ cron</span>` : '';
    return `<div class="msg-row ${role}">
      <div class="msg-avatar">${letter}</div>
      <div>
        <div class="bubble">${rendered}</div>
        ${ts?`<div class="msg-ts">${ts}${cronTag}</div>`:''}
      </div>
    </div>`;
  }).join('');
  el.innerHTML = html || `<div class="empty-state"><p>Sem mensagens de texto</p></div>`;
  el.scrollTop = el.scrollHeight;
}

function _buildSoulNav(key) {
  const ta = document.getElementById(`editor-${key}`);
  const nav = document.getElementById(`soul-nav-${key}`);
  if (!ta || !nav) return;
  const items = [];
  ta.value.split('\n').forEach((line, i) => {
    const m = line.match(/^#{1,3}\s+(.+)/);
    if (m) items.push({ line: i, text: m[1] });
  });
  nav.innerHTML = items.map(h =>
    `<div class="soul-nav-item" onclick="_scrollToLine('${key}',${h.line})" title="${escHtml(h.text)}">${escHtml(h.text)}</div>`
  ).join('') || `<div style="font-size:10px;color:var(--t4);padding:4px 12px">Sem seções</div>`;
}

function _scrollToLine(key, lineNum) {
  const ta = document.getElementById(`editor-${key}`);
  if (!ta) return;
  const lines = ta.value.split('\n');
  const lh = parseFloat(getComputedStyle(ta).lineHeight) || 21;
  ta.scrollTop = lineNum * lh;
  const charIdx = lines.slice(0, lineNum).reduce((s, l) => s + l.length + 1, 0);
  ta.focus();
  ta.setSelectionRange(charIdx, charIdx);
}

async function insertSoulTemplate(key) {
  const ta = document.getElementById(`editor-${key}`);
  if (!ta) return;
  if (ta.value.trim() && !confirm('Substituir o conteúdo atual pelo padrão?')) return;
  try {
    const r = await fetch(_apiUrl(`/api/base/${key}`));
    if (!r.ok) throw new Error('not ok');
    const d = await r.json();
    ta.value = d.content || (key === 'produto' ? PRODUTO_TEMPLATE : SOUL_TEMPLATE);
  } catch {
    ta.value = key === 'produto' ? PRODUTO_TEMPLATE : SOUL_TEMPLATE;
  }
  markDirty(key);
  _buildSoulNav(key);
}

function prodExpParts(c,day){ const v=(c.agenda.expediente||{})[day]; if(!v) return null; const p=v.split('-'); return [p[0],p[1]]; }

  const ag = c.agenda || {};

    return `<div class="pday-row ${open?'':'closed'}">

function prodSetHours(day,idx,val){ const p=prodExpParts(S.produtoCfg,day)||['09:00','18:00']; p[idx]=val; S.produtoCfg.agenda.expediente[day]=`${p[0]}-${p[1]}`; prodMark(); prodRefreshCap(); }

// ---- Capacidade (heatmap derivado, read-only) ----
function prodCapAt(c,day,hour){
  const parts=prodExpParts(c,day); if(!parts) return {open:false,count:0};
  const oh=parseInt(parts[0]), ch=parseInt(parts[1]);
  if(!(hour>=oh && hour<ch)) return {open:false,count:0};
  let count=0;
  (c.profissionais||[]).forEach(p=>{
    if(!(p.dias||[]).includes(day)) return;
    const pr=(p.horario||'').split('-'); if(pr.length<2) return;
    if(hour>=parseInt(pr[0]) && hour<parseInt(pr[1])) count++;
  });
  return {open:true,count};
}
function prodCapHtml(c){
  // faixa de horas = min abertura .. max fechamento entre os dias abertos
  let lo=24, hi=0;
  PROD_DAYS.forEach(day=>{ const p=prodExpParts(c,day); if(p){ lo=Math.min(lo,parseInt(p[0])); hi=Math.max(hi,parseInt(p[1])); } });
  if(lo>=hi){ return `<div class="empty-state" style="padding:16px"><p>Defina o expediente e adicione profissionais para ver sua capacidade.</p></div>`; }
  const hours=[]; for(let h=lo;h<hi;h++) hours.push(h);
  let peak=0, peakInfo='';
  const head = `<div class="cap-rowlbl"></div>`+PROD_DAYS.map(d=>`<div class="cap-hd">${PROD_DLBL[d]}</div>`).join('');
  const body = hours.map(h=>{
    const cells = PROD_DAYS.map(day=>{
      const {open,count}=prodCapAt(c,day,h);
      if(!open) return `<div class="cap-cell cap-closed">·</div>`;
      if(count===0) return `<div class="cap-cell cap-gap" title="Aberto mas sem ninguém na escala">0</div>`;
      if(count>peak){ peak=count; peakInfo=`${PROD_DLBL[day]} ${h}h`; }
      const pct=Math.min(85,18+count*20);
      return `<div class="cap-cell" style="background:color-mix(in srgb,var(--brand) ${pct}%,transparent)${count>=4?';color:#fff':''}">${count}</div>`;
    }).join('');
    return `<div class="cap-rowlbl">${h}h</div>${cells}`;
  }).join('');
  const gap = hours.some(h=>PROD_DAYS.some(day=>{const r=prodCapAt(c,day,h);return r.open&&r.count===0;}));
  return `<div class="cap-grid" style="grid-template-columns:32px repeat(7,1fr)">${head}${body}</div>
    <div class="cap-legend">
      <span><span class="cap-swatch" style="background:color-mix(in srgb,var(--brand) 18%,transparent)"></span>menos</span>
      <span><span class="cap-swatch" style="background:color-mix(in srgb,var(--brand) 78%,transparent)"></span>mais cadeiras</span>
      <span><span class="cap-swatch cap-closed" style="width:14px;height:14px"></span>fechado</span>
      ${peak?`<span style="margin-left:auto;color:var(--t2)">Pico: <b>${peakInfo}</b>, ${peak} ao mesmo tempo</span>`:''}
    </div>
    ${gap?`<div class="ov-att-item warn" style="margin-top:10px">⚠️ Há horário aberto sem ninguém na escala — nesses horários nenhum cliente pode ser atendido.</div>`:''}`;
}

  return `<div class="pcard" id="prodCapCard"><div class="section-title">Capacidade — quantos clientes cabem ao mesmo tempo</div>
    <div class="pcard-desc">Calculado por quem trabalha. Mais gente na mesma hora = mais cadeiras.</div>

async function prodSave(){
  const btn=document.getElementById('prodSaveBtn'); if(btn){ btn.disabled=true; btn.textContent='Salvando…'; }
  try{
    const r=await fetch(_apiUrl(`/api/profiles/${S.profile.id}/produto-config`),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({config:S.produtoCfg})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok){ toast((j.errors&&j.errors[0])||'Erro de validação','err'); return; }
    S.produtoCfg=j.config||S.produtoCfg;
    S.dirty.produto=false;
    document.querySelector('.nav-btn[data-tab="produto"]')?.classList.remove('dirty');

  }catch{ toast('Erro ao salvar','err'); }

function cronDeliverLabel(j) {
  if (!j.deliver || j.deliver === 'local') return '';
  if (j.deliver === 'origin' && j.origin) {
    const name = j.origin.chat_name || '';
    const platform = j.origin.platform || '';
    return name ? `${name}${platform ? ' · ' + platform : ''}` : platform || 'origin';
  }
  return j.deliver;
}

function cronOriginPhone(j) {
  return j.deliver === 'origin' && j.origin?.phone ? fmtPhone(j.origin.phone) : '';
}

function cronScheduleStr(j) {
  const s = j.schedule;
  if (!s) return j.schedule_display || '';
  if (typeof s === 'string') return s;
  if (typeof s === 'object') return s.display || s.expr || j.schedule_display || '';
  return '';
}

function cronDateTime(val) {
  if (!val) return null;
  if (typeof val === 'string') {
    const d = new Date(val);
    return isNaN(d.getTime()) ? null : d.toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
  }
  if (typeof val === 'number') return fmtDateTime(val);
  return null;
}

async function deleteCronJob(jobId) {
  if (!confirm('Excluir este cron job?')) return;
  try {
    const r = await fetch(_apiUrl(`/api/profiles/${S.profile.id}/cron/${encodeURIComponent(jobId)}`), { method: 'DELETE' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    toast('Cron job excluído');
    if (S.tab === 'agenda') renderAgenda();
  } catch {
    toast('Erro ao excluir', 'err');
  }
}

// Preenche as seções de cron (jobs + histórico) dentro da aba Agenda.
let _agendaCron = { jobs: [], history: [] };

async function loadCronSections(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = `<div class="empty-state"><div class="spin"></div></div>`;
  try {
    const { jobs, history } = await api(`/api/profiles/${S.profile.id}/cron`);
    _agendaCron = { jobs, history };

    // Jobs configurados
    const jobsHtml = jobs.length
      ? jobs.map(j => {
          const sched = cronScheduleStr(j);
          const nextDt = cronDateTime(j.next_run_at || j.next_run);
          const lastDt = cronDateTime(j.last_run_at || j.last_run);
          const deliver = cronDeliverLabel(j);
          const prompt = typeof j.prompt === 'string' ? j.prompt : '';
          const jobName = typeof j.name === 'string' && j.name ? j.name : '';
          return `
          <div style="background:var(--bg1);border:1px solid var(--b3);border-radius:var(--r);padding:14px 16px">
            <div style="display:flex;gap:12px;align-items:flex-start">
              <div style="flex:1;min-width:0">
                ${jobName ? `<div style="font-size:13px;font-weight:500;color:var(--t1);margin-bottom:6px">${escHtml(jobName)}</div>` : ''}
                ${prompt ? `<details style="margin-bottom:8px"><summary style="font-size:11px;color:var(--t4);cursor:pointer;user-select:none">ver prompt</summary><div style="font-size:11px;color:var(--t3);line-height:1.5;margin-top:6px;white-space:pre-wrap">${escHtml(prompt)}</div></details>` : ''}
                <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
                  ${sched ? `<span style="font-size:11px;color:var(--t3);font-family:monospace">${escHtml(sched)}</span>` : ''}
                  ${deliver ? `<span class="badge badge-cron">${escHtml(deliver)}</span>` : ''}
                  ${cronOriginPhone(j) ? `<span style="font-size:11px;color:var(--t4)">${escHtml(cronOriginPhone(j))}</span>` : ''}
                  <span class="badge ${j.enabled !== false ? 'badge-green' : 'badge-red'}">${j.enabled !== false ? 'ativo' : 'pausado'}</span>
                </div>
                ${nextDt || lastDt ? `<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:6px;font-size:10px;color:var(--t4)">
                  ${nextDt ? `<span>próxima: <span style="color:var(--t3)">${nextDt}</span></span>` : ''}
                  ${lastDt ? `<span>última: ${lastDt}</span>` : ''}
                </div>` : ''}
              </div>
              <button onclick="deleteCronJob('${escHtml(String(j.id))}')" title="Excluir"
                style="background:none;border:none;color:var(--t4);cursor:pointer;padding:4px;flex-shrink:0;line-height:0;border-radius:4px"
                onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--t4)'">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <path d="M2 4h12M5 4V2h6v2M6 7v5M10 7v5M3 4l1 9h8l1-9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>`;
        }).join('')
      : `<div class="cron-empty">Nenhuma notificação configurada neste perfil</div>`;

    // Timeline de execuções
    const tlHtml = history.length
      ? `<div class="timeline">${history.map((h, i) => {
          const dur = h.ended_at && h.started_at ? ((h.ended_at - h.started_at)).toFixed(1)+'s' : '—';
          const isLast = i === history.length - 1;
          const dotCls = h.end_reason === 'error' ? 'err' : 'ok';
          return `<div class="tl-item">
            <div class="tl-dot-wrap">
              <div class="tl-dot ${dotCls}"></div>
              ${!isLast?'<div class="tl-line"></div>':''}
            </div>
            <div class="tl-body">
              <div class="tl-time">${fmtDateTime(h.started_at)}</div>
              ${(h.contact_name || h.contact_phone) ? `<div style="font-size:11px;color:var(--t3);margin-top:2px">${h.contact_name ? escHtml(h.contact_name) : ''}${h.contact_phone ? `<span style="color:var(--t4)"> · ${escHtml(fmtPhone(h.contact_phone))}</span>` : ''}</div>` : ''}
              ${h.sent_message ? `<div style="font-size:12px;color:var(--t1);margin-top:3px;line-height:1.4;font-style:italic">"${escHtml(h.sent_message)}"</div>` : `<div class="tl-id">${escHtml(h.session_id)}</div>`}
              ${h.task_name ? `<div style="font-size:10px;color:var(--t4);margin-top:2px">${escHtml(h.task_name)}</div>` : ''}
              <div class="tl-meta">
                <span class="tl-tag">⏱ ${dur}</span>
                ${h.message_count?`<span class="tl-tag">💬 ${h.message_count} msgs</span>`:''}
                ${h.input_tokens?`<span class="tl-tag">↑${h.input_tokens.toLocaleString()}</span>`:''}
                ${h.estimated_cost_usd?`<span class="tl-tag">$${h.estimated_cost_usd.toFixed(4)}</span>`:''}
                ${h.end_reason?`<span class="badge ${h.end_reason==='error'?'badge-red':'badge-green'}" style="font-size:9px">${h.end_reason}</span>`:''}
              </div>
            </div>
          </div>`;
        }).join('')}</div>`
      : `<div class="cron-empty">Nenhuma execução registrada</div>`;

    el.innerHTML = `
      <div>
        <div class="section-title">Notificações Configuradas</div>
        <div style="display:flex;flex-direction:column;gap:8px">${jobsHtml}</div>
      </div>
      <div style="margin-top:20px">
        <div class="section-title">Histórico de execuções</div>
        ${tlHtml}
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><p>Erro ao carregar cron</p></div>`;
  }
}

// ── TAB: Agenda ───────────────────────────────────────────────────────────────
let _calDate = new Date();

function calMove(delta) {
  _calDate = new Date(_calDate.getFullYear(), _calDate.getMonth() + delta, 1);
  _renderCalendar();
}
function calToday() { _calDate = new Date(); _renderCalendar(); }

function _renderCalendar() {
  const box = document.getElementById('calBox');
  if (!box) return;
  const y = _calDate.getFullYear(), m = _calDate.getMonth();
  const title = _calDate.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  const first = new Date(y, m, 1);
  const start = new Date(y, m, 1 - first.getDay());          // domingo anterior
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const dows = ['dom', 'seg', 'ter', 'qua', 'qui', 'sex', 'sáb'];
  const apptCounts = new Map();
  (_agendaAppointments || [])
    .filter(a => a.status !== 'cancelled' && _apptVisible(a))
    .forEach(a => {
      const d = new Date(a.scheduled_at * 1000);
      const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      apptCounts.set(iso, (apptCounts.get(iso) || 0) + 1);
    });
  let cells = '';
  for (let i = 0; i < 42; i++) {
    const d = new Date(start.getFullYear(), start.getMonth(), start.getDate() + i);
    const other = d.getMonth() !== m;
    const isToday = d.getTime() === today.getTime() ? ' today' : '';
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const sel = _selectedDay === iso ? ' sel' : '';
    const count = apptCounts.get(iso) || 0;
    const badge = count > 0 ? `<span class="cal-badge" title="${count} agendamento${count > 1 ? 's' : ''}">${count}</span>` : '';
    cells += `<div class="cal-day${other?' other':''}${isToday}${sel}"${other ? '' : ` onclick="openDayPanel('${iso}', true)" data-day="${iso}"`}><span class="cal-num">${d.getDate()}</span>${badge}</div>`;
  }
  box.innerHTML = `
    <div class="cal-head">
      <div class="cal-title">${title}</div>
      <button class="btn-g" onclick="calToday()">Hoje</button>
      <button class="btn-g" onclick="calMove(-1)" title="Mês anterior">‹</button>
      <button class="btn-g" onclick="calMove(1)" title="Próximo mês">›</button>
    </div>
    <div class="cal-grid">
      ${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>`;
}

function renderAgenda() {

  el.innerHTML = `<div class="tab-page">
    <div>
      <div class="section-title">Calendário</div>
      <div class="pchips" id="agendaProfFilter" style="margin:0 0 10px"></div>
      <div id="calBox" style="background:var(--bg1);border:1px solid var(--b3);border-radius:var(--r);padding:14px"></div>
      <div style="font-size:10px;color:var(--t4);margin-top:6px">Clique em um dia para ver os horários e agendamentos.</div>
