// Compromissos reais (appointments.db, escritos pelo agente via skill
// `appointments` ou manualmente) — carregados uma vez e cacheados; reabre o
// dia selecionado quando chegam, igual ao loadCronSections.
let _agendaAppointments = [];

// Filtro por profissional (aba Agenda). _agendaProf = null → todos.
let _agendaProfs = [];
let _agendaProf = null;
async function loadAgendaProfs() {
  try {
    const { config } = await api(`/api/profiles/${S.profile.id}/produto-config`);
    _agendaProfs = (config.profissionais || []).map(p => p.nome).filter(Boolean);
  } catch { _agendaProfs = []; }
  if (_agendaProf && !_agendaProfs.includes(_agendaProf)) _agendaProf = null;
  _renderProfFilter();
}
function _renderProfFilter() {
  const box = document.getElementById('agendaProfFilter');
  if (!box) return;
  if (_agendaProfs.length <= 1) { box.innerHTML = ''; return; }  // só faz sentido com +1
  const chip = (label, val) => {
    const on = (val === null && !_agendaProf) || _agendaProf === val;
    const arg = val === null ? 'null' : `'${escHtml(val).replace(/'/g, "\\'")}'`;
    return `<div class="pchip toggle ${on ? 'on' : ''}" onclick="_setAgendaProf(${arg})">${escHtml(label)}</div>`;
  };
  box.innerHTML = chip('Todos', null) + _agendaProfs.map(n => chip(n, n)).join('');
}
function _setAgendaProf(v) {
  _agendaProf = v;
  _renderProfFilter();
  _renderCalendar();
  if (_selectedDay) openDayPanel(_selectedDay);
}
function _apptVisible(a) { return !_agendaProf || (a.resource || '') === _agendaProf; }

async function loadAgendaAppointments() {
  try {
    _agendaAppointments = await api(`/api/profiles/${S.profile.id}/appointments`);
  } catch {
    _agendaAppointments = [];
  }

// ── Agenda: painel lateral do dia (listagem por hora) ──────────────────────────
// Sempre visível; abre no dia de hoje por padrão e troca ao clicar em outro dia.
let _selectedDay = null;

// Eventos do dia: compromissos reais (appointments.db) + notificações
// derivadas dos crons do perfil (próximas execuções e histórico entregue).
function _dayEvents(iso) {
  const evts = [];
  const sameDay = ts => {
    const d = typeof ts === 'number' ? new Date(ts * 1000) : new Date(ts);
    if (isNaN(d.getTime())) return null;
    const dIso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return dIso === iso ? d : null;
  };
  for (const a of (_agendaAppointments || [])) {
    if (!_apptVisible(a)) continue;
    const d = sameDay(a.scheduled_at);
    if (d) {
      // Compromisso ocupa [scheduled_at, ends_at) — quando o agente reserva
      // vários serviços juntos (ou um só de longa duração), isso é UM
      // registro com ends_at bem à frente, não um por hora. Sem ends_at
      // (compromisso legado), cai no comportamento antigo: ocupa só a hora.
      const dEnd = a.ends_at ? new Date(a.ends_at * 1000) : null;
      let endHour = d.getHours() + 1;
      if (dEnd) {
        const sameLocalDay = dEnd.getFullYear() === d.getFullYear() && dEnd.getMonth() === d.getMonth() && dEnd.getDate() === d.getDate();
        endHour = sameLocalDay ? Math.max(d.getHours() + 1, dEnd.getMinutes() > 0 ? dEnd.getHours() + 1 : dEnd.getHours()) : 24;
      }
      evts.push({
        id: a.id, hour: d.getHours(), endHour,
        time: d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}),
        endTime: dEnd ? dEnd.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) : null,
        icon: APPT_STATUS_ICON[a.status] || '📅', title: a.title || 'Agendamento',
        resource: a.resource || '',
        details: [
          `Contato: ${fmtPhone(a.contact_phone)}`,
          a.resource ? `Profissional: ${a.resource}` : null,
          a.service ? `Serviço: ${a.service}` : null,
          dEnd ? `Horário: ${d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} – ${dEnd.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}` : null,
          `Status: ${APPT_STATUS_LABEL[a.status] || a.status}`,
          a.notes ? `Notas: ${a.notes}` : null,
        ].filter(Boolean),
      });
    }
  }
  // Crons são lembretes automáticos (feature separada — ver seção "Lembretes
  // automáticos" abaixo do calendário); não entram no calendário/painel do dia.
  return evts;
}

// `nav=true` só no clique do usuário num dia do calendário — no mobile isso
// avança para a página de horários; cargas automáticas (abrir a aba, refresh
// dos appointments) apenas atualizam o conteúdo sem trocar de página.
function openDayPanel(iso, nav) {
  _selectedDay = iso;
  document.querySelectorAll('.cal-day').forEach(d =>
    d.classList.toggle('sel', d.dataset.day === iso));
  const panel = document.getElementById('dayPanel');
  if (!panel) return;

  const [y, m, dd] = iso.split('-').map(Number);
  const dayLabel = new Date(y, m - 1, dd).toLocaleDateString('pt-BR',
    { weekday: 'long', day: '2-digit', month: 'long' });
  const evts = _dayEvents(iso);

  let hours = '';
  for (let h = 0; h < 24; h++) {
    // Um compromisso ocupa [hour, endHour) — em h===hour mostra o card
    // completo; nas horas seguintes do MESMO compromisso mostra uma
    // continuação em vez de repetir o card ou deixar "—" (era o bug: virava
    // um agendamento por hora, com gap quando o cálculo furava).
    const mine = evts.filter(e => e.hour === h);
    const continuing = evts.filter(e => e.hour < h && e.endHour > h);
    const spanned = mine.length || continuing.length;
    const contOnly = continuing.length && !mine.length;
    const isLastCont = contOnly && continuing.some(e => e.endHour - 1 === h);
    const targetHour = contOnly ? continuing[0].hour : h;
    hours += `<div class="hour-row${contOnly ? ' spanned' : ''}${contOnly && !isLastCont ? ' spanned-mid' : ''}${isLastCont ? ' spanned-last' : ''}" onclick="toggleHourDetail(this, ${targetHour})" data-hour="${h}">
      <div class="hour-label">${String(h).padStart(2,'0')}:00</div>
      <div class="hour-body">${spanned
        ? mine.map(e => `<div class="hour-evt">${e.icon} ${escHtml(e.title)}${e.resource ? ` <span style="color:var(--brand);font-weight:600">· 👤 ${escHtml(e.resource)}</span>` : ''} <span style="color:var(--t4);font-weight:400">· ${e.time}${e.endTime ? `–${e.endTime}` : ''}</span></div>`).join('')
          + (contOnly ? (isLastCont
              ? `<div class="hour-evt hour-evt-cont">↳ em atendimento${continuing[0].endTime ? ` <span style="font-weight:400">até ${continuing[0].endTime}</span>` : ''}</div>`
              : `<div class="hour-evt-cont-bar">│</div>`) : '')
        : '<span style="color:var(--t4)">—</span>'}</div>
    </div>
    <div class="hour-detail" style="display:none" data-hour-detail="${h}">${mine.length
      ? mine.map(e => `<div style="margin-bottom:8px;display:flex;gap:8px;align-items:flex-start">
          <div style="flex:1;min-width:0">
            ${e.details.length ? e.details.map(x => `<div style="color:var(--t3);margin-top:2px;white-space:pre-wrap">${escHtml(x)}</div>`).join('') : '<div style="color:var(--t4)">Sem mais detalhes.</div>'}
          </div>
          ${e.id != null ? `<button class="btn-g" title="Excluir agendamento" onclick="event.stopPropagation(); deleteAppointment(${e.id})" style="flex-shrink:0;padding:3px 7px;font-size:12px">🗑</button>` : ''}
        </div>`).join('')
      : '<span style="color:var(--t4)">Sem agendamento neste horário.</span>'}</div>`;
  }

  panel.innerHTML = `
    <div class="cp-header">
      <button class="m-back" onclick="setMobilePane('list')" aria-label="Voltar">‹</button>
      <div style="min-width:0;flex:1">
        <div style="font-size:13px;font-weight:600;color:var(--t1);text-transform:capitalize">${escHtml(dayLabel)}</div>
        <div style="font-size:10px;color:var(--t4)">${evts.length} evento(s) neste dia</div>
      </div>
    </div>
    <div class="cp-body" style="gap:0">${hours}</div>`;

  if (nav) setMobilePane('day');

  // Foco vindo do Overview: rola pra hora do compromisso e abre o detalhe.
  // Consumido só depois que os appointments chegaram (loadAgendaAppointments
  // reabre o dia quando termina — na 1ª passada a lista pode estar vazia).
  const _f = (_agendaFocus && _agendaFocus.iso === iso) ? _agendaFocus : null;
  if (_f) {
    const det = panel.querySelector(`[data-hour-detail="${_f.hour}"]`);
    if (det && evts.some(e => e.hour === _f.hour)) det.style.display = '';
    if (_agendaAppointments.length) _agendaFocus = null;
  }
  // Rola até o primeiro evento (ou 8h, horário comercial). No mobile o
  // scroller é o cp-body da própria página de horários — scrollIntoView
  // arrastaria também containers overflow:hidden ancestrais.
  const target = _f ? _f.hour : (evts.length ? Math.min(...evts.map(e => e.hour)) : 8);
  const row = panel.querySelector(`.hour-row[data-hour="${target}"]`);
  if (row) {
    if (isMobile()) {
      const body = panel.querySelector('.cp-body');
      if (body) body.scrollTop = Math.max(0, row.offsetTop - body.offsetTop);
    } else {
      row.scrollIntoView({ block: 'start' });
    }
  }
}

// `h` aqui é sempre a hora de INÍCIO do compromisso — cliques em qualquer
// linha de continuação (corpo ou seta final) abrem/rolam pra primeira linha,
// nunca o próprio detalhe da linha clicada (não existe: continuação não tem
// dado próprio, é o mesmo compromisso).
function toggleHourDetail(rowEl, h) {
  const container = rowEl.parentElement;
  const det = container.querySelector(`[data-hour-detail="${h}"]`);
  if (!det) return;
  det.style.display = det.style.display === 'none' ? '' : 'none';
  if (det.style.display !== 'none') {
    const targetRow = container.querySelector(`.hour-row[data-hour="${h}"]`);
    if (targetRow && targetRow !== rowEl) targetRow.scrollIntoView({ block: 'nearest' });
  }
}

async function deleteAppointment(id) {
  if (!confirm('Excluir este agendamento? Essa ação não pode ser desfeita.')) return;
  try {
    await api(`/api/profiles/${S.profile.id}/appointments/${id}`, { method: 'DELETE' });
    await loadAgendaAppointments(); // já re-renderiza o painel do dia selecionado e o calendário
  } catch (e) {
    toast('Erro ao excluir agendamento: ' + (e.message || e), 'err');
  }
}

// ── TAB: Leads (kanban de qualificação) ────────────────────────────────────────
const PHASE_LABELS = {
  'phase_one': 'Novo/Triagem',
  'phase_two': 'Agendado',
  'phase_three': 'Confirmado',
  'phase_four': 'Concluído',
  'phase_five': 'Cancelado'
};
const PHASE_ORDER = ['phase_one', 'phase_two', 'phase_three', 'phase_four', 'phase_five'];

let allLeads = [];
let selectedLeadPhone = null;

async function renderLeads() {
  const el = document.getElementById('tabContent');
  el.innerHTML = `<div style="display:flex;flex:1;overflow:hidden;min-height:0;position:relative">
    <div class="kanban-board" id="kanbanBoard"></div>
    <div class="lead-sidebar" id="leadSidebar"></div>
  </div>`;

  try {
    const [leads, contactsRes] = await Promise.all([
      api(`/api/profiles/${S.profile.id}/leads`),
      api(`/api/profiles/${S.profile.id}/contacts`).catch(() => ({ contacts: [] })),
    ]);
    allLeads = leads;
    const nameByPhone = {};
    for (const c of (contactsRes.contacts || [])) {
      if (c.phone && c.name) nameByPhone[c.phone] = c.name;
    }

    // Agrupa leads por fase
    const byPhase = {};
    for (const phase of PHASE_ORDER) {
      byPhase[phase] = leads.filter(l => l.phase === phase);
    }

    // Renderiza colunas
    const board = document.getElementById('kanbanBoard');
    board.innerHTML = PHASE_ORDER.map(phase => {
      const leadsInPhase = byPhase[phase] || [];
      return `
        <div class="kanban-column" data-phase="${phase}">
          <div class="kanban-header">
            <div class="kanban-title">${escHtml(PHASE_LABELS[phase] || phase)}</div>
            <div class="kanban-count">${leadsInPhase.length} lead${leadsInPhase.length!==1?'s':''}</div>
          </div>
          <div class="kanban-stack" data-phase-stack="${phase}">
            ${leadsInPhase.map(lead => renderLeadCard(lead, nameByPhone[lead.contact_phone])).join('')}
          </div>
        </div>
      `;
    }).join('');

    // Attach event listeners
    document.querySelectorAll('.lead-card').forEach(card => {
      card.addEventListener('click', () => openLeadSidebar(card.dataset.phone));
    });

    // Drag-drop (simples: solta o lead e busca a fase da coluna destino)
    document.querySelectorAll('.lead-card').forEach(card => {
      card.draggable = true;
      card.addEventListener('dragstart', e => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/phone', card.dataset.phone);
      });
    });

    document.querySelectorAll('.kanban-stack').forEach(stack => {
      stack.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        stack.style.background = 'rgba(201, 162, 39, 0.1)';
      });
      stack.addEventListener('dragleave', () => {
        stack.style.background = '';
      });
      stack.addEventListener('drop', async e => {
        e.preventDefault();
        stack.style.background = '';
        const phone = e.dataTransfer.getData('text/phone');
        const newPhase = stack.dataset.phaseStack;
        await moveLeadToPhase(phone, newPhase);
      });
    });

  } catch (err) {
    el.innerHTML = `<div class="tab-page"><div class="empty-state"><p>Erro ao carregar leads: ${escHtml(String(err.message || err))}</p></div></div>`;
  }
}

function renderLeadCard(lead, name) {
  const scorePercent = (lead.qualification_score || 0);
  return `
    <div class="lead-card" data-phone="${escHtml(lead.contact_phone)}" draggable="true">
      <div class="lead-name">${escHtml(name || fmtPhone(lead.contact_phone))}</div>
      ${name ? `<div class="lead-phone" style="font-size:10px;color:var(--t4)">${escHtml(fmtPhone(lead.contact_phone))}</div>` : ''}
      <div class="lead-phone" style="font-size:10px;color:var(--t4)">Score: ${lead.qualification_score || 0}</div>
      <div class="lead-score-bar">
        <div class="lead-score-fill" style="width:${scorePercent}%"></div>
      </div>
    </div>
  `;
}

async function openLeadSidebar(phone) {
  selectedLeadPhone = phone;
  const lead = allLeads.find(l => l.contact_phone === phone);
  if (!lead) return;

  // Acha o contato correspondente na lista de contatos (mesma chave "phone"
  // resolvida que o leads.db usa) — dá nome + o id técnico bruto (chat_id/
  // @lid), que é o que a memória e os crons usam pra escopar por contato
  // (não é o mesmo valor que "phone").
  let contact = null;
  try {
    const { contacts } = await api(`/api/profiles/${S.profile.id}/contacts`);
    contact = (contacts || []).find(c => c.phone === phone) || null;
  } catch {}
  const contactId = contact?.id || null;

  const sidebar = document.getElementById('leadSidebar');
  sidebar.classList.add('open');
  sidebar.innerHTML = `
    <div class="lead-sidebar-header">
      <span id="leadSidebarName" style="font-size:12px;font-weight:600;color:var(--t1)">${escHtml(contact?.name || fmtPhone(phone))}</span>
      <button class="lead-sidebar-close" onclick="closeLeadSidebar()">×</button>
    </div>
    <div class="lead-sidebar-body">
      <div class="lead-info-row">
        <span class="lead-info-label">Telefone</span>
        <span class="lead-info-value" style="cursor:pointer" title="clique para copiar" onclick="copyPhone('${escAttr(phone)}', this)">${escHtml(fmtPhone(phone))}</span>
      </div>
      ${contact?.first_seen ? `<div class="lead-info-row">
        <span class="lead-info-label">Primeiro contato</span>
        <span class="lead-info-value">${fmtDateTime(contact.first_seen)}</span>
      </div>` : ''}
      <div class="lead-info-row">
        <span class="lead-info-label">Fase Atual</span>
        <span class="lead-info-value">${escHtml(PHASE_LABELS[lead.phase] || lead.phase)}</span>
      </div>
      <div>
        <div class="lead-info-label" style="margin-bottom:8px">🧠 Memória do Contato</div>
        <div id="leadMemoryContent" class="lead-memory">Carregando…</div>
      </div>
      <div>
        <div class="lead-info-label" style="margin-bottom:8px">📅 Agendamentos</div>
        <div id="leadAppointments">Carregando…</div>
      </div>
      <div>
        <div class="lead-info-label" style="margin-bottom:8px">🔔 Lembretes</div>
        <div id="leadCrons">Carregando…</div>
      </div>
      <div>
        <label class="lead-info-label" style="display:block;margin-bottom:6px">Mudar Fase</label>
        <select class="lead-phase-select" onchange="onLeadPhaseChanged('${escHtml(phone)}', this.value)">
          ${PHASE_ORDER.map(p => `<option value="${p}" ${p===lead.phase?'selected':''}>${escHtml(PHASE_LABELS[p])}</option>`).join('')}
        </select>
      </div>
      <div>
        <div class="lead-info-label" style="color:var(--red);margin-bottom:8px">Zona de perigo</div>
        <button class="btn-d" style="width:100%" onclick="deleteLead('${escAttr(phone)}')">
          🗑 Excluir lead
        </button>
      </div>
    </div>
  `;

  // Memória (escopada pelo id técnico bruto, não pelo telefone resolvido).
  const memEl = document.getElementById('leadMemoryContent');
  if (contactId) {
    try {
      const mem = await api(`/api/profiles/${S.profile.id}/contact/memory?contact_id=${encodeURIComponent(contactId)}`);
      const memText = mem.files && mem.files.length ? mem.files.map(f => (f.content || '').split(/\n§\n/).map(e => e.trim()).filter(Boolean).join('\n\n')).join('\n---\n') : '';
      memEl.textContent = memText || '(Sem memória)';
      // Nome dito pelo próprio cliente em conversa (salvo via memory tool,
      // "Nome: ...") é mais confiável que o nome de perfil do WhatsApp —
      // prefira-o no cabeçalho quando o contato não tiver um nome de
      // exibição real (ex.: caiu no fallback do telefone).
      if (!contact?.name) {
        const m = memText.match(/Nome:\s*(.+)/i);
        if (m && m[1].trim()) {
          document.getElementById('leadSidebarName').textContent = m[1].trim();
        }
      }
    } catch { memEl.textContent = 'Erro ao carregar memória'; }
  } else {
    memEl.textContent = 'Contato sem ID.';
  }

  // Agendamentos reais (appointments.db), mesma fonte da aba Conversas/Agenda.
  const agEl = document.getElementById('leadAppointments');
  try {
    const appts = await api(`/api/profiles/${S.profile.id}/appointments?contact_phone=${encodeURIComponent(phone)}`);
    agEl.innerHTML = appts.length
      ? appts.map(a => `<div style="background:var(--bg2);border:1px solid var(--bg3);border-radius:6px;padding:8px 10px;margin-bottom:6px">
            <div style="display:flex;justify-content:space-between;gap:8px">
              <div style="font-size:10px;color:var(--t4)">${fmtDateTime(a.scheduled_at)}</div>
              <span style="font-size:9px;color:${APPT_STATUS_COLOR[a.status]||'var(--t4)'}">${APPT_STATUS_ICON[a.status]||''} ${APPT_STATUS_LABEL[a.status]||a.status}</span>
            </div>
            ${a.title ? `<div style="font-size:11px;font-weight:600;color:var(--t1);margin-top:3px">${escHtml(a.title)}</div>` : ''}
            ${a.notes ? `<div style="font-size:10px;color:var(--t3);margin-top:2px;font-style:italic;white-space:pre-wrap">${escHtml(a.notes)}</div>` : ''}
          </div>`).join('')
      : `<div class="cp-empty">Nenhum agendamento registrado para este contato.</div>`;
  } catch {
    agEl.innerHTML = `<div class="cp-empty" style="color:var(--orange)">Erro ao carregar agendamentos</div>`;
  }

  // Crons deste contato — mesmo critério de match da aba Conversas.
  const cronEl = document.getElementById('leadCrons');
  try {
    const { jobs } = await api(`/api/profiles/${S.profile.id}/cron`);
    const digits = s => String(s || '').replace(/\D/g, '');
    const mine = (jobs || []).filter(j => {
      const o = j.origin || {};
      const oid = o.chat_id || o.user_id || '';
      if (contactId && oid && oid === contactId) return true;
      if (o.phone && digits(o.phone) === digits(phone)) return true;
      return false;
    });
    cronEl.innerHTML = mine.length
      ? mine.map(j => `<div style="border-bottom:1px solid var(--bg2);padding:6px 0">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <div style="font-size:10px;color:var(--t3);font-family:monospace">${escHtml(cronScheduleStr(j))}</div>
            <span class="badge ${j.enabled !== false ? 'badge-green' : 'badge-red'}" style="font-size:9px">${j.enabled !== false ? 'ativo' : 'pausado'}</span>
          </div>
          ${j.name ? `<div style="font-size:11px;color:var(--t2);margin-top:2px">${escHtml(j.name)}</div>` : ''}
          ${cronDateTime(j.next_run_at || j.next_run) ? `<div style="font-size:10px;color:var(--t4);margin-top:2px">próxima: ${cronDateTime(j.next_run_at || j.next_run)}</div>` : ''}
        </div>`).join('')
      : `<div class="cp-empty">Nenhum cron para este contato.</div>`;
  } catch {
    cronEl.innerHTML = `<div class="cp-empty" style="color:var(--orange)">Erro ao carregar crons</div>`;
  }
}

function closeLeadSidebar() {
  document.getElementById('leadSidebar').classList.remove('open');
  selectedLeadPhone = null;
}

async function onLeadPhaseChanged(phone, newPhase) {
  await moveLeadToPhase(phone, newPhase);
}

async function moveLeadToPhase(phone, newPhase) {
  try {
    await api(`/api/profiles/${S.profile.id}/leads/${phone}/move`, {
      method: 'POST',
      body: JSON.stringify({ phase: newPhase })
    });
    closeLeadSidebar();
    renderLeads();
  } catch (err) {
    alert(`Erro ao mover lead: ${err.message || err}`);
  }
}

async function deleteLead(phone) {
  if (!confirm(`Excluir este lead do Kanban?\n\nApaga apenas o card do Kanban (leads.db) deste contato. NÃO apaga a conversa, mensagens, agendamentos nem lembretes (cron) — para isso use "Excluir contato" na aba Conversas.`)) return;
  try {
    await api(`/api/profiles/${S.profile.id}/leads/${phone}`, { method: 'DELETE' });
    closeLeadSidebar();
    renderLeads();
  } catch (err) {
    alert(`Erro ao excluir lead: ${err.message || err}`);
  }
}

// ── TAB: Logs ─────────────────────────────────────────────────────────────────
let logsSource = 'gateway';

async function renderLogs(source) {
  if (source) logsSource = source;
  const el = document.getElementById('dbLogsBody') || document.getElementById('tabContent');

  const sources = ['gateway','bridge','errors','agent','leads'];
  const toolbar = `<div class="log-toolbar">
    ${sources.map(s => `<button class="btn-g" style="${s===logsSource?'border-color:var(--brand);color:var(--t1)':''}" onclick="renderLogs('${s}')">${s}.log</button>`).join('')}
    <button class="btn-g" onclick="renderLogs()" style="margin-left:auto">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
        <path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8 2l2.5 2L8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>`;

  if (!document.getElementById('logBox')) {
    el.innerHTML = `<div class="tab-page" style="flex:1;min-height:0">
      ${toolbar}
      <div class="log-box" id="logBox"><div class="spin"></div></div>
    </div>`;
  } else {
    // just refresh toolbar + content
    el.querySelector('.log-toolbar').outerHTML = toolbar;
    document.getElementById('logBox').innerHTML = '<div class="spin"></div>';
  }

  // Re-render toolbar highlight
  el.innerHTML = `<div class="tab-page" style="flex:1;min-height:0">
    ${toolbar}
    <div class="log-box" id="logBox"><div class="spin" style="margin:auto"></div></div>
  </div>`;

  try {
    const { lines } = await api(`/api/profiles/${S.profile.id}/logs?source=${logsSource}&n=300`);
    const logEl = document.getElementById('logBox');
    if (!lines.length) { logEl.textContent = '(arquivo vazio)'; return; }
    logEl.innerHTML = lines.map(l => {
      let cls = 'info';
      if (/ERROR|CRITICAL/i.test(l)) cls = 'err';
      else if (/WARN/i.test(l)) cls = 'warn';
      else if (/DEBUG/i.test(l)) cls = 'debug';
      return `<div class="log-line ${cls}">${escHtml(l)}</div>`;
    }).join('');
    logEl.scrollTop = logEl.scrollHeight;
  } catch {
    const logEl = document.getElementById('logBox');
    if (logEl) logEl.textContent = 'Erro ao carregar logs';
  }
}

// ── TAB: Contatos ─────────────────────────────────────────────────────────────
let allContacts = [];

async function renderContatos() {
  const el = document.getElementById('tabContent');
  el.innerHTML = `<div class="tab-page"><div class="empty-state"><div class="spin"></div></div></div>`;
  try {
    const { contacts, updated_at } = await api(`/api/profiles/${S.profile.id}/contacts`);
    allContacts = contacts;

    el.innerHTML = `<div class="tab-page">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <input class="contacts-search" id="contactSearch" type="text"
          placeholder="Filtrar contatos…" oninput="filterContacts()">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:var(--t4)">${contacts.length} contato(s)${updated_at?' · atualizado '+new Date(updated_at).toLocaleString('pt-BR'):''}</span>
          <button class="btn-g" onclick="refreshContatos()" title="Atualizar contatos">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
              <path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M8 2l2.5 2L8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="contactsTable"></div>
    </div>`;
    renderContactsTable(contacts);
  } catch {
    el.innerHTML = `<div class="tab-page"><div class="empty-state"><p>Erro ao carregar contatos</p></div></div>`;
  }
}

// Refresh contacts: drop the group name/member cache so live data is re-fetched.
function refreshContatos() {
  S.groupInfo = {};
  renderContatos();
}

// Click a contact row → expand an inline panel with the contact's persisted
// memory (memories/contacts/<safe_id>/*.md). Click again to collapse.
async function toggleContactMemory(id, rowEl) {
  const next = rowEl.nextElementSibling;
  if (next && next.classList.contains('mem-row')) { next.remove(); return; }
  document.querySelectorAll('tr.mem-row').forEach(r => r.remove());
  const tr = document.createElement('tr');
  tr.className = 'mem-row';
  tr.innerHTML = `<td colspan="6" style="background:var(--bg2);padding:12px 16px"><div class="spin"></div></td>`;
  rowEl.after(tr);
  const cell = tr.querySelector('td');
  try {
    const res = await api(`/api/profiles/${S.profile.id}/contact/memory?contact_id=${encodeURIComponent(id)}`);
    if (!res.files || !res.files.length) {
      cell.innerHTML = `<span style="color:var(--t4);font-size:11px">🧠 Sem memória persistida para este contato ainda.</span>`;
      return;
    }
    cell.innerHTML = `<div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--t4);margin-bottom:8px">🧠 Memória do contato</div>` +
      res.files.map(f => {
        const body = (f.content || '').trim();
        return `<div style="margin-bottom:10px">
          <div style="font-size:10px;color:var(--t4);font-family:monospace;margin-bottom:3px">${escHtml(f.name)}</div>
          <div style="white-space:pre-wrap;font-size:12px;color:var(--t2);line-height:1.5;border-left:2px solid var(--brand);padding-left:10px">${body ? escHtml(body) : '<em style="color:var(--t4)">(vazio)</em>'}</div>
        </div>`;
      }).join('');
  } catch (e) {
    cell.innerHTML = `<span style="color:var(--orange);font-size:11px">Erro ao carregar memória: ${escHtml(String(e.message || e))}</span>`;
  }
}

function filterContacts() {
  const q = (document.getElementById('contactSearch')?.value || '').toLowerCase();
  const filtered = q
    ? allContacts.filter(c =>
        (c.name||'').toLowerCase().includes(q) ||
        (c.phone||'').includes(q) ||
        (c.id||'').toLowerCase().includes(q) ||
        (c.thread_id||'').toLowerCase().includes(q))
    : allContacts;
  renderContactsTable(filtered);
}

function renderContactsTable(contacts) {
  const el = document.getElementById('contactsTable');
  if (!el) return;
  if (!contacts.length) {
    el.innerHTML = `<div class="cron-empty">Nenhum contato encontrado</div>`;
    return;
  }
  el.innerHTML = `<table class="ct">
    <thead><tr>
      <th>Tipo</th>
      <th>Client ID</th>
      <th>Nome</th>
      <th>Telefone / Membros</th>
      <th>Registro</th>
      <th></th>
    </tr></thead>
    <tbody>${contacts.map(c => {
      const isGroup = c.type === 'group';
      const lastCol = isGroup
        ? `<span class="mono" data-gmembers="${escHtml(c.id)}" style="font-size:10px;color:var(--t4)">carregando membros…</span>`
        : escHtml(c.phone ? fmtPhone(c.phone) : '—');
      const nameCell = isGroup
        ? `👥 <span data-gname="${escHtml(c.id)}">${escHtml(c.name||'—')}</span>`
        : escHtml(c.name||'—');
      return `<tr class="contact-row" style="cursor:pointer" title="Clique para ver a memória deste contato"
        onclick="toggleContactMemory('${escAttr(c.id)}', this)">
      <td style="font-size:11px;white-space:nowrap">${isGroup?'👥 Grupo':'💬 DM'}</td>
      <td class="mono" style="font-size:10px;color:var(--t4)">${escHtml(c.thread_id||c.id||'—')}</td>
      <td style="font-weight:500">${nameCell}</td>
      <td style="font-size:11px">${lastCol}</td>
      <td style="font-size:11px;color:var(--t4)">${c.first_seen ? fmtDateTime(c.first_seen) : '—'}</td>
      <td style="text-align:right;width:24px">
        <span class="trash-btn" title="Excluir do banco todas as linhas (sessões + mensagens) deste ${isGroup?'grupo':'contato'}"
          onclick="event.stopPropagation(); deleteContact('${escAttr(c.id)}', ${isGroup}, '${escAttr(c.name||'')}')"
          style="cursor:pointer;opacity:.55;font-size:13px"
          onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.55">🗑</span>
      </td>
    </tr>`;
    }).join('')}</tbody>
  </table>`;
  loadContactGroupMembers(contacts);
}

// Delete all state.db rows (sessions + messages) for one contact, live.
async function deleteContact(id, isGroup, name) {
  const liveName = isGroup ? (S.groupInfo?.[id]?.name || name) : name;
  const what = isGroup
    ? `o grupo "${liveName}" — todas as sessões de TODOS os participantes`
    : `o contato "${liveName || id}"`;
  if (!confirm(`Excluir do banco ${what}?\n\nApaga sessões e mensagens deste contato no state.db (backup automático é criado antes), além do lead (Kanban) e dos lembretes (cron) dele. Agendamentos NÃO são apagados. O gateway deste perfil reinicia (~7s) para limpar o cache de sessão — necessário para o contato não ficar com histórico corrompido. Não afeta as credenciais do WhatsApp nem a memória.`)) return;
  try {
    const r = await fetch(_apiUrl(`/api/profiles/${S.profile.id}/contact/delete`), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contact_id: id, is_group: isGroup })
    });
    const res = await r.json();
    if (!r.ok || res.error) throw new Error(res.error || `HTTP ${r.status}`);
    if (S.groupInfo) delete S.groupInfo[id];
    alert(`Removido: ${res.removed_sessions} sessão(ões), ${res.removed_messages} mensagem(ns), ${res.removed_lead||0} lead(s), ${res.removed_crons||0} cron(s).` +
          (res.gateway_restarted ? `\nGateway reiniciado (pid ${res.gateway_pid}).` : '') +
          (res.removed_sessions || res.removed_messages ? `\nBackup: ${res.backup}` : '\n(nada encontrado para este contato)'));
    if (S.tab === 'conversas') { S.session = null; renderConversas(); }
    else renderContatos();
  } catch (e) {
    alert('Erro ao excluir: ' + (e.message || e));
  }
}

// Fill the "Membros" cell for group contacts using the cached/fetched members.
async function loadContactGroupMembers(contacts) {
  S.groupInfo = S.groupInfo || {};
  for (const c of contacts.filter(x => x.type === 'group' && x.id)) {
    let gi = S.groupInfo[c.id];
    if (!gi) {
      try {
        const info = await api(`/api/profiles/${S.profile.id}/group/members?chat_id=${encodeURIComponent(c.id)}`);
        gi = S.groupInfo[c.id] = { name: info.name, count: info.count, members: info.members };
      } catch { gi = S.groupInfo[c.id] = { count: 0, members: [] }; }
    }
    // Live group name (channel_directory often stores only the numeric id).
    const nameEl = document.querySelector(`[data-gname="${CSS.escape(c.id)}"]`);
    if (nameEl && gi.name) nameEl.textContent = gi.name;
    // Members: each a clickable chip — hover shows phone, click copies it.
    const cell = document.querySelector(`[data-gmembers="${CSS.escape(c.id)}"]`);
    if (cell) {
      if (gi.members?.length) {
        cell.innerHTML = gi.members.map(m =>
          `<span class="member-chip" title="${escHtml(m.phone ? fmtPhone(m.phone) : 'sem número')} — clique para copiar"
             onclick="event.stopPropagation(); copyPhone('${escAttr(m.phone||'')}', this)"
             style="display:inline-block;background:var(--bg3);color:var(--t2);border-radius:9px;padding:1px 7px;margin:0 4px 3px 0;cursor:pointer">${escHtml(m.name)}</span>`
        ).join('');
      } else {
        cell.textContent = 'sem membros';
      }
    }
  }
}

// ── TAB: DB ───────────────────────────────────────────────────────────────────
let dbState = { tables: [], table: null, offset: 0, limit: 100 };

async function renderDB() {
  const el = document.getElementById('dbLogsBody') || document.getElementById('tabContent');
  el.innerHTML = `<div class="tab-page"><div class="empty-state"><div class="spin"></div></div></div>`;
  try {
    const { tables, error } = await api(`/api/profiles/${S.profile.id}/db/tables`);
    if (error) throw new Error(error);
    dbState.tables = tables || [];
    if (!dbState.tables.length) {
      el.innerHTML = `<div class="tab-page"><div class="empty-state"><p>Sem state.db ou nenhuma tabela.</p></div></div>`;
      return;
    }
    if (!dbState.table || !dbState.tables.some(t => t.name === dbState.table)) {
      // Default to `messages` when present, else first table.
      dbState.table = dbState.tables.some(t => t.name === 'messages')
        ? 'messages' : dbState.tables[0].name;
      dbState.offset = 0;
    }
    const opts = dbState.tables.map(t =>
      `<option value="${escHtml(t.name)}" ${t.name===dbState.table?'selected':''}>${escHtml(t.name)} (${t.rows ?? '?'})</option>`).join('');
    el.innerHTML = `<div class="tab-page">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <select id="dbTableSel" onchange="dbSelectTable(this.value)"
          style="background:var(--bg2);color:var(--t1);border:1px solid var(--bg3);border-radius:6px;padding:6px 10px;font-family:inherit;font-size:12px">${opts}</select>
        <span id="dbPager" style="font-size:11px;color:var(--t4)"></span>
        <span style="flex:1"></span>
        <button class="tab-btn" onclick="dbPage(-1)">‹ anterior</button>
        <button class="tab-btn" onclick="dbPage(1)">próxima ›</button>
      </div>
      <details style="font-size:11px;color:var(--t4)">
        <summary style="cursor:pointer">SQL (somente leitura)</summary>
        <div style="display:flex;gap:8px;margin-top:8px">
          <textarea id="dbSql" rows="3" placeholder="SELECT * FROM messages LIMIT 50"
            style="flex:1;background:var(--bg2);color:var(--t1);border:1px solid var(--bg3);border-radius:6px;padding:8px;font-family:'Courier New',monospace;font-size:11px"></textarea>
          <button class="tab-btn" onclick="dbRunQuery()" style="align-self:flex-start">Executar</button>
        </div>
      </details>
      <div id="dbTableView"></div>
    </div>`;
    loadDBTable();
  } catch (e) {
    el.innerHTML = `<div class="tab-page"><div class="empty-state"><p>Erro ao carregar DB: ${escHtml(String(e.message||e))}</p></div></div>`;
  }
}

function dbSelectTable(name) { dbState.table = name; dbState.offset = 0; loadDBTable(); }
function dbPage(dir) {
  const next = dbState.offset + dir * dbState.limit;
  if (next < 0) return;
  dbState.offset = next; loadDBTable();
}

async function loadDBTable() {
  const view = document.getElementById('dbTableView');
  if (!view) return;
  view.innerHTML = `<div class="empty-state"><div class="spin"></div></div>`;
  try {
    const selectedTable = dbState.tables.find(t => t.name === dbState.table);
    const dbType = selectedTable?.db || 'state';
    const q = `?table=${encodeURIComponent(dbState.table)}&db=${dbType}&limit=${dbState.limit}&offset=${dbState.offset}`;
    const { columns, rows, total, error } = await api(`/api/profiles/${S.profile.id}/db/table${q}`);
    if (error) throw new Error(error);
    const from = total ? dbState.offset + 1 : 0;
    const to = Math.min(dbState.offset + dbState.limit, total);
    const pager = document.getElementById('dbPager');
    if (pager) pager.textContent = `${from}–${to} de ${total}`;
    renderDBGrid(view, columns, rows);
  } catch (e) {
    view.innerHTML = `<div class="cron-empty">Erro: ${escHtml(String(e.message||e))}</div>`;
  }
}

async function dbRunQuery() {
  const sql = (document.getElementById('dbSql')?.value || '').trim();
  if (!sql) return;
  const view = document.getElementById('dbTableView');
  view.innerHTML = `<div class="empty-state"><div class="spin"></div></div>`;
  try {
    const selectedTable = dbState.tables.find(t => t.name === dbState.table);
    const dbType = selectedTable?.db || 'state';
    const { columns, rows, error } = await api(`/api/profiles/${S.profile.id}/db/query`,
      { method: 'POST', body: JSON.stringify({ sql, db: dbType }) });
    if (error) throw new Error(error);
    const pager = document.getElementById('dbPager');
    if (pager) pager.textContent = `${rows.length} linha(s) — consulta`;
    renderDBGrid(view, columns, rows);
  } catch (e) {
    view.innerHTML = `<div class="cron-empty">Erro: ${escHtml(String(e.message||e))}</div>`;
  }
}

function dbCell(v) {
  if (v === null || v === undefined) return `<span style="color:var(--t4)">NULL</span>`;
  let s = String(v);
  if (s.length > 200) s = s.slice(0, 200) + '…';
  return escHtml(s);
}

function renderDBGrid(view, columns, rows) {
  if (!columns || !columns.length) { view.innerHTML = `<div class="cron-empty">Sem colunas</div>`; return; }
  if (!rows.length) { view.innerHTML = `<div class="cron-empty">Nenhuma linha</div>`; return; }
  view.innerHTML = `<div style="overflow:auto"><table class="ct">
    <thead><tr>${columns.map(c => `<th>${escHtml(c)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r => `<tr>${r.map(c =>
      `<td class="mono" style="font-size:10px;white-space:nowrap;max-width:340px;overflow:hidden;text-overflow:ellipsis">${dbCell(c)}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

async function doRestart() {
  const btn = document.getElementById('restartBtn');
  const status = document.getElementById('restartStatus');
  if (!btn) return;
  if (!confirm(`Reiniciar o gateway do agente "${S.profile.id}"?`)) return;
  btn.disabled = true;
  if (status) status.textContent = 'Reiniciando…';
  try {
    const r = await apiPost(`/api/profiles/${S.profile.id}/restart`, {});
    if (status) status.textContent = r.respawned ? 'Gateway reiniciado.' : 'Processo encerrado (reinício manual necessário).';
    toast(r.respawned ? 'Gateway reiniciado' : 'Gateway encerrado', r.respawned ? 'ok' : 'warn');
    setTimeout(loadProfiles, 3000);
  } catch {
    if (status) status.textContent = 'Erro ao reiniciar.';
    toast('Erro ao reiniciar gateway', 'err');
  } finally {
    btn.disabled = false;
  }
}

let _qrEs = null;

function closeQrStream() {
  if (_qrEs) { _qrEs.close(); _qrEs = null; }
}

function showQrImage(profileId) {
  const area = document.getElementById('qrArea');
  if (!area || S.profile?.id !== profileId) return;
  const url = `/api/profiles/${profileId}/qr?t=${Date.now()}`;
  fetch(_apiUrl(url)).then(r => {
    if (!r.ok) return;
    area.innerHTML = `
      <img class="qr-img" src="${url}" alt="QR Code" style="display:block">
      <div style="margin-top:8px;display:flex;align-items:center;gap:10px">
        <button class="btn-g" onclick="loadQr()">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
            <path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M8 2l2.5 2L8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Recriar
        </button>
        <span style="font-size:10px;color:var(--t4)">auto-atualiza quando novo QR é gerado</span>
      </div>`;
  }).catch(() => {});
}

async function loadQr() {
  closeQrStream();
  const area = document.getElementById('qrArea');
  if (!area) return;
  const profileId = S.profile?.id;
  if (!profileId) return;

  area.innerHTML = `<div style="display:flex;align-items:center;gap:8px"><div class="spin"></div><span style="font-size:11px;color:var(--t4)">Gerando novo QR Code…</span></div>`;

  try {
    // Gera novo QR Code
    await api(`/api/profiles/${profileId}/qr/generate`, { method: 'POST' });
  } catch (e) {
    area.innerHTML = `<div style="color:var(--orange);font-size:11px">Erro ao gerar QR: ${escHtml(String(e.message))}</div>`;
    return;
  }

  // Aguarda o bridge processar e gerar o QR
  area.innerHTML = `<div style="display:flex;align-items:center;gap:8px"><div class="spin"></div><span style="font-size:11px;color:var(--t4)">Aguardando QR do bridge…</span></div>`;

  // Try immediately (may already have a QR from bridge)
  showQrImage(profileId);

  // Open SSE stream — auto-updates when bridge generates a new QR
  _qrEs = new EventSource(`/api/profiles/${profileId}/qr/events`);
  _qrEs.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.event === 'new_qr') showQrImage(profileId);
    } catch {}
  };
  _qrEs.onerror = () => {
    const a2 = document.getElementById('qrArea');
    if (a2 && a2.querySelector('.spin')) {
      a2.innerHTML = `<div style="font-size:12px;color:var(--t4);margin-bottom:8px">Bridge offline ou sessão ativa — sem QR disponível.</div>
        <button class="btn-g" onclick="loadQr()">Tentar novamente</button>`;
    }
    closeQrStream();
  };
}

let _currentTheme = localStorage.getItem('hermes_theme') || 'vintageEditorial';
// Validação: se o tema guardado não existir, usa o padrão
if (!THEMES[_currentTheme]) {
  _currentTheme = 'vintageEditorial';
  localStorage.setItem('hermes_theme', _currentTheme);
}

function _lightenHex(hex, amt) {
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return 'rgba(255,255,255,.2)';
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + amt);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + amt);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + amt);
  return `rgb(${r},${g},${b})`;
}

function _hexLuminance(hex) {
  const h = hex.replace('#','');
  if (h.length !== 6) return 0;
  const lin = c => { c /= 255; return c <= 0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); };
  return 0.2126*lin(parseInt(h.slice(0,2),16)) + 0.7152*lin(parseInt(h.slice(2,4),16)) + 0.0722*lin(parseInt(h.slice(4,6),16));
}

function applyTheme(name) {
  const t = THEMES[name];
  if (!t) return;
  _currentTheme = name;
  localStorage.setItem('hermes_theme', name);
  const root = document.documentElement.style;
  Object.entries(t.vars).forEach(([k, v]) => root.setProperty(k, v));
  // Auto-detect bubble text colour: black on bright brand, white on dark brand
  const brand = (t.vars['--brand'] || '').trim();
  if (/^#[0-9a-fA-F]{6}$/.test(brand)) {
    root.setProperty('--bubble-fg', _hexLuminance(brand) > 0.35 ? '#111' : '#fff');
  }
  // Update vya-agent title: bg = swatches[2], color = swatches[0], blob = lighter bg
  const titleEl = document.getElementById('vyaAgentTitle');
  if (titleEl && t.swatches && t.swatches.length >= 3) {
    titleEl.style.background = t.swatches[2];
    titleEl.querySelector('span').style.color = t.swatches[0];
    document.documentElement.style.setProperty('--vya-agent-blob1', t.swatches[1]);
    document.documentElement.style.setProperty('--vya-agent-blob2', t.swatches[2]);
    // Topbar mobile: "vya-agent" na mesma cor do fundo do título da sidebar
    document.documentElement.style.setProperty('--vya-agent-title-bg', t.swatches[2]);
  }
  renderThemeList();
}

function renderThemeList() {
  const el = document.getElementById('themeList');
  if (!el) return;
  el.innerHTML = Object.entries(THEMES).map(([key, t]) => {
    const active = key === _currentTheme;
    return `<button onclick="applyTheme('${key}')" style="
      display:flex;align-items:center;gap:10px;width:100%;
      background:${active ? 'var(--b3)' : 'color-mix(in srgb, var(--bg1) 50%, transparent)'};
      border:1px solid ${active ? 'var(--brand)' : 'var(--b3)'};
      border-radius:6px;padding:8px 10px;cursor:pointer;text-align:left;
      color:var(--t1);font-size:12px;font-family:inherit;transition:border-color .15s
    ">
      <div style="display:flex;gap:3px;flex-shrink:0">
        ${t.swatches.map(c=>`<div style="width:12px;height:12px;border-radius:3px;background:${c}"></div>`).join('')}
      </div>
      <span style="font-weight:${active?'700':'400'}">${t.label}</span>
      ${active ? `<svg style="margin-left:auto" width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-6" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
    </button>`;
  }).join('');
}

// Posiciona o drawer (overlay absoluto) pinando `top` logo abaixo do ÚLTIMO
// botão visível da nav e `bottom` no topo do footer. Com as duas âncoras
// fixas no CSS, é geometricamente impossível o drawer subir por cima dos
// itens do menu — mesmo que qualquer medição de altura saia errada, o box
// não tem como crescer além das âncoras. Medimos o último .nav-btn visível
// (não o container) porque itens aparecem/somem depois do load
// (applyRoleTabs) e containers flex têm estados intermediários.
// O drawer é filho do #funZone com inset:0 (CSS puro) — nenhuma medição ou
// âncora calculada aqui: abrir/fechar é só classe.
function toggleThemeDrawer() {
  const drawer = document.getElementById('themeDrawer');
  const chev = document.getElementById('themeToggleChev');
  const label = document.getElementById('themeToggleLabel');
  const willOpen = !drawer.classList.contains('open');
  if (willOpen) {
    renderThemeList();
    drawer.classList.add('open');
    if (chev) chev.style.transform = 'rotate(180deg)';
    if (label) label.textContent = 'Fechar';
  } else {
    drawer.classList.remove('open');
    if (chev) chev.style.transform = '';
    if (label) label.textContent = 'Temas';
  }
}

// ── Auto-refresh ──────────────────────────────────────────────────────────────
async function autoRefresh() {
  await loadProfiles();
  if (S.profile && S.tab === 'conversas') {
    try {
      S.convs = await api(`/api/profiles/${S.profile.id}/conversations`);
      filterConvs();
    } catch {}
  }
}

// ── Identity / role-based tabs ────────────────────────────────────────────────
async function loadMe() {
  try { S.me = await api('/api/me'); }
  catch { S.me = { role: 'admin', tabs: null }; }  // fallback: show everything
  applyRoleTabs();
  applyUserBadge();
}
function applyRoleTabs() {
  const allowed = S.me && Array.isArray(S.me.tabs) ? S.me.tabs : null;
  if (!allowed) return;                       // no restriction → all tabs
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.style.display = allowed.includes(b.dataset.tab) ? '' : 'none';
  });
  if (!allowed.includes(S.tab)) setTab(allowed[0] || 'overview');
}
function applyUserBadge() {
  const user = S.me && S.me.user && S.me.user !== 'local' ? S.me.user : '';
  const logoutUrl = S.me && S.me.logout_url ? S.me.logout_url : '';
  const badge = document.getElementById('userBadge');
  const btn = document.getElementById('logoutBtn');
  if (badge) { badge.textContent = user; badge.title = user; }
  if (btn) btn.style.display = logoutUrl ? '' : 'none';
}
function doLogout() {
  const url = S.me && S.me.logout_url ? S.me.logout_url : '';
  if (url) window.location.href = url;
}

// ── Init ──────────────────────────────────────────────────────────────────────
applyTheme(_currentTheme);

// ── funZone: aurora fluida interativa (entre Ações e Temas) ──────────────────
// Blobs orgânicos nas cores 2 e 3 (swatches[1]/[2]) do tema ativo, com blur
// de lava-lamp. Seguem o cursor em cluster suave; clique dispara um pulso que
// os espalha + onda expansiva. Cores acompanham o tema ao vivo (lidas por
// frame). Pausa quando a aba está oculta ou a área encolhe (drawer de temas).
(function initFunZone() {
  const zone = document.getElementById('funZone');
  if (!zone) return;
  const cv = document.createElement('canvas');
  zone.appendChild(cv);
  const cx = cv.getContext('2d');

  let W = 0, H = 0, DPR = Math.min(2, window.devicePixelRatio || 1);
  const fit = () => {
    const r = zone.getBoundingClientRect();
    W = Math.max(0, r.width); H = Math.max(0, r.height);
    cv.width = W * DPR; cv.height = H * DPR;
    cx.setTransform(DPR, 0, 0, DPR, 0, 0);
  };
  new ResizeObserver(fit).observe(zone);
  fit();

  const rand = (a, b) => a + Math.random() * (b - a);
  const N = 7;
  const blobs = Array.from({ length: N }, (_, i) => ({
    // âncora relativa (0..1) — sobrevive a resize sem sair da área
    ax: rand(.15, .85), ay: rand(.1, .9),
    x: 0, y: 0, vx: 0, vy: 0,
    r: rand(.16, .30),              // raio relativo à largura
    ph: rand(0, Math.PI * 2),       // fase do drift
    sp: rand(.00025, .0006),        // velocidade do drift
    ci: i % 2,                      // 0 → swatches[1], 1 → swatches[2]
  }));
  const ripples = [];
  let pointer = null;

  zone.addEventListener('pointermove', e => {
    const r = zone.getBoundingClientRect();
    pointer = { x: e.clientX - r.left, y: e.clientY - r.top };
  });
  zone.addEventListener('pointerleave', () => { pointer = null; });
  zone.addEventListener('pointerdown', e => {
    const r = zone.getBoundingClientRect();
    const px = e.clientX - r.left, py = e.clientY - r.top;
    ripples.push({ x: px, y: py, r: 4, a: .9 });
    for (const b of blobs) {                       // empurrão radial
      const dx = b.x - px, dy = b.y - py;
      const d = Math.hypot(dx, dy) || 1;
      const f = Math.min(9, 260 / d);
      b.vx += (dx / d) * f; b.vy += (dy / d) * f;
    }
  });

  const hexRgb = h => /^#[0-9a-fA-F]{6}$/.test(h)
    ? [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]
    : [128,128,128];

  function frame(t) {
    requestAnimationFrame(frame);
    if (document.hidden || H < 48 || W < 20) return;   // pausa barata

    const sw = (THEMES[_currentTheme] || {}).swatches || [];
    const cols = [hexRgb(sw[1] || '#888888'), hexRgb(sw[2] || '#aaaaaa')];

    cx.clearRect(0, 0, W, H);
    cx.globalCompositeOperation = 'lighter';

    for (const b of blobs) {
      // drift orgânico (lissajous em volta da âncora)
      const ox = Math.sin(t * b.sp + b.ph) * W * .18;
      const oy = Math.cos(t * b.sp * 1.35 + b.ph * 2.1) * H * .22;
      let tx = b.ax * W + ox, ty = b.ay * H + oy;
      // cursor presente → o cluster gravita levemente pra ele
      if (pointer) { tx = tx * .45 + pointer.x * .55; ty = ty * .45 + pointer.y * .55; }
      b.vx += (tx - b.x) * .0045; b.vy += (ty - b.y) * .0045;
      b.vx *= .93; b.vy *= .93;                       // amortecimento
      b.x += b.vx; b.y += b.vy;

      const R = Math.max(14, b.r * W);
      const [cr, cg, cb2] = cols[b.ci];
      const g = cx.createRadialGradient(b.x, b.y, 0, b.x, b.y, R);
      g.addColorStop(0, `rgba(${cr},${cg},${cb2},.5)`);
      g.addColorStop(1, `rgba(${cr},${cg},${cb2},0)`);
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(b.x, b.y, R, 0, Math.PI * 2); cx.fill();
    }

    // ondas de clique
    cx.globalCompositeOperation = 'source-over';
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r += 2.4; rp.a *= .94;
      if (rp.a < .02) { ripples.splice(i, 1); continue; }
      const [cr, cg, cb2] = cols[1];
      cx.strokeStyle = `rgba(${cr},${cg},${cb2},${rp.a})`;
      cx.lineWidth = 2;
      cx.beginPath(); cx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2); cx.stroke();
    }
  }
  requestAnimationFrame(frame);
})();
loadMe().then(loadProfiles);
setInterval(autoRefresh, 30_000);
</script>
